# =============================================================================
#  Fluent Bit Agent (송신기) - AOI 설비
# =============================================================================
#
#  역할: AOI 설비 PC의 작업처리결과 로그 파일(.txt, .csv, .log)을
#        중앙 서버(Aggregator)로 전송합니다.
#
#  설치 방법:
#    1. 설비 PC에 Fluent Bit를 설치합니다 (fluent-bit.exe)
#    2. 이 파일을 설비 PC에 복사합니다
#    3. [설비 설정] 항목에서 equipment_id, line_code 등을 변경합니다
#    4. [INPUT] 섹션에서 Path를 실제 로그 위치로 변경합니다
#    5. [OUTPUT] 섹션에서 Host를 실제 서버 IP로 변경합니다
#
#  실행: fluent-bit -c AOI.conf
#
# =============================================================================

[SERVICE]
    Flush        1
    Log_Level    info
    storage.path C:\fluent-bit-data\aoi
    storage.sync normal

# ── [파서] 파일 전체를 하나의 이벤트로 묶기 ──
# Vector Agent의 multiline 설정과 동일한 역할
[MULTILINE_PARSER]
    Name          multiline_all
    Type          regex
    Flush_timeout 1000
    Rule          "start_state" "/^.+$/" "cont"
    Rule          "cont"        "/^.+$/" "cont"

# ── [소스] 파일 감시 ──
# Vector Agent의 [sources.work_logs]와 동일한 역할
[INPUT]
    Name             tail
    Tag              work_logs
    Path             C:\logs\aoi\*.txt,C:\logs\aoi\*.csv
    Read_from_Head   true
    DB               C:\fluent-bit-data\aoi\tail.db
    Refresh_Interval 5
    Multiline        On
    Parser_Firstline multiline_all

# ── [메타데이터 태깅] ──
# Vector Agent의 [transforms.add_metadata]와 동일한 역할
[FILTER]
    Name          modify
    Match         work_logs
    Add           equipment_type AOI
    Add           log_type       INSPECTION
    Add           line_code      LINE-01
    Add           equipment_id   AOI-001

# ── [출력] Aggregator 서버로 전송 ──
# Vector Agent의 [sinks.to_aggregator]와 동일한 역할
# forward 프로토콜 → Aggregator의 [sources.from_fluent_agents] (port 24224)
[OUTPUT]
    Name            forward
    Match           *
    Host            20.10.30.112
    Port            24224
    storage.total_limit_size 256M
