# =============================================================================
#  Fluent Bit Agent (송신기) - DOWNLOAD 설비
# =============================================================================
#
#  실행: fluent-bit -c DOWNLOAD.conf
#

[SERVICE]
    Flush        1
    Log_Level    info
    storage.path C:\fluent-bit-data\download
    storage.sync normal

# ── [파서] 파일 전체를 하나의 이벤트로 묶기 ──
[MULTILINE_PARSER]
    Name          multiline_all
    Type          regex
    Flush_timeout 1000
    Rule          "start_state" "/^.+$/" "cont"
    Rule          "cont"        "/^.+$/" "cont"

# ── [소스] 파일 감시 ──
[INPUT]
    Name             tail
    Tag              work_logs
    Path             C:\logs\download\*.txt,C:\logs\download\*.csv
    Read_from_Head   true
    DB               C:\fluent-bit-data\download\tail.db
    Refresh_Interval 5
    Multiline        On
    Parser_Firstline multiline_all

# ── [메타데이터 태깅] ──
[FILTER]
    Name          modify
    Match         work_logs
    Add           equipment_type DOWNLOAD
    Add           log_type       INSPECTION
    Add           line_code      LINE-01
    Add           equipment_id   DOWNLOAD-001

# ── [출력] Aggregator 서버로 전송 ──
[OUTPUT]
    Name            forward
    Match           *
    Host            20.10.30.112
    Port            24224
    storage.total_limit_size 256M
