# =============================================================================
#  Vector Aggregator (수신기) - 중앙 서버에서 실행
# =============================================================================
#
#  역할: 여러 설비(Agent)에서 보내는 로그를 한곳에서 수신하여,
#        파싱 → 파일 저장 → Node.js API 서버로 전달합니다.
#
#  데이터 흐름:
#    Agent 전송 → Aggregator 수신 → raw 파일 저장 (원본 그대로)
#                                 → VRL 파싱 → HTTP API로 Node.js 전달
#                                            → Node.js가 Oracle DB에 저장
#
#  사전 조건:
#    1. Node.js API 서버(port 3100)가 먼저 실행 중이어야 합니다
#    2. 방화벽에서 port 6000 (Agent 수신용)이 열려 있어야 합니다
#
#  실행 명령어:
#    vector --config vector-aggregator.toml
#
# =============================================================================


# -----------------------------------------------------------------------------
# data_dir: Vector가 내부적으로 사용하는 데이터 저장 경로
# - 디스크 버퍼, 체크포인트 등을 저장합니다
# - 이 폴더가 없으면 Vector가 자동 생성합니다
# -----------------------------------------------------------------------------
data_dir = 'C:\Project\vector\vector-data'


# -----------------------------------------------------------------------------
# [api]: Vector 자체 API 서버 설정
# - Vector의 상태 확인, 헬스체크에 사용합니다
# - 프론트엔드 대시보드에서 Vector 상태를 조회할 때 이 API를 호출합니다
# - 0.0.0.0  → 모든 네트워크 인터페이스에서 접근 가능
# - 8687     → 포트 번호 (Agent는 8686 사용)
# -----------------------------------------------------------------------------
[api]
enabled = true
address = "0.0.0.0:8687"


# =============================================================================
#  Source (소스): Agent들로부터 데이터 수신
# =============================================================================
#
#  type    = "vector"  → Vector 프로토콜로 수신 (Agent가 같은 프로토콜로 전송)
#  address = "0.0.0.0:6000"
#    - 0.0.0.0 → 모든 네트워크에서 접속 허용 (Agent가 외부에서 접속하므로 필수)
#    - 6000    → 수신 포트 (Agent의 sinks.to_aggregator.address와 일치해야 함)
#
#  주의: Agent 설정의 address 포트와 반드시 동일해야 합니다!
#        Agent: address = "서버IP:6000"  ↔  Aggregator: address = "0.0.0.0:6000"
#
# =============================================================================

[sources.from_agents]
type = "vector"
address = "0.0.0.0:6000"


# =============================================================================
#  Source 2: Fluent Bit Agent 수신 (Fluentd forward 프로토콜)
# =============================================================================
#
#  32비트 Windows 등 Vector를 사용할 수 없는 설비 PC에서
#  Fluent Bit Agent가 forward 프로토콜로 전송한 로그를 수신합니다.
#
#  Fluent Bit Agent 설정 예시:
#    [OUTPUT]
#      Name   forward
#      Match  *
#      Host   서버IP
#      Port   24224
#
#  주의: Agent 설정의 Host/Port와 반드시 동일해야 합니다!
#
# =============================================================================

[sources.from_fluent_agents]
type = "fluent"
address = "0.0.0.0:24224"


# =============================================================================
#  Fluent Bit → Vector 필드 정규화
# =============================================================================
#
#  Fluent Bit가 보내는 필드명을 Vector Agent와 동일하게 맞춥니다.
#    .log  → .message  (파일 내용)
#    .path → .file     (원본 파일 경로)
#
#  metadata (equipment_type, equipment_id 등)는
#  Fluent Bit의 modify filter에서 동일하게 태깅되므로 그대로 통과합니다.
#
# =============================================================================

[transforms.normalize_fluent]
type = "remap"
inputs = ["from_fluent_agents"]
source = '''
msg = del(.log)
if msg != null { .message = msg }
fp = del(.path)
if fp != null { .file = fp }
'''


# =============================================================================
#  이벤트 라우팅: 하트비트 메트릭 vs 로그 이벤트 분리
# =============================================================================
#
#  Agent는 로그 이벤트(파일 데이터)와 메트릭 이벤트(하트비트)를 모두 전송합니다.
#  route 변환으로 하트비트 메트릭을 분리하여 별도 파이프라인으로 처리합니다.
#
#  - heartbeat: .name == "heartbeat" → 하트비트 API로 전달
#  - _unmatched: 나머지 로그 이벤트 → 기존 파싱 파이프라인
#
#  inputs: Vector Agent(from_agents) + Fluent Bit Agent(normalize_fluent) 모두 수신
#
# =============================================================================

[transforms.route_events]
type = "route"
inputs = ["from_agents", "normalize_fluent"]

[transforms.route_events.route]
# Vector internal_metrics(메트릭 이벤트)를 분리하여 드랍
# - Agent가 internal_metrics 소스를 포함한 경우, namespace="vector" 메트릭이 유입됨
# - 이 메트릭은 로그가 아니므로 parse_logs로 보내면 Validation 에러 발생
# - heartbeat는 Agent Manager가 직접 HTTP POST로 전송 — Vector 경유 안 함
is_metric = 'exists(.namespace) && .namespace == "vector" && exists(.kind)'


# =============================================================================
#  Transforms (변환): 설비유형 + 로그유형별 파싱
# =============================================================================
#
#  Agent가 태깅한 .equipment_type, .log_type 필드를 기준으로 파싱 로직을 분기합니다.
#  VRL(Vector Remap Language)은 Vector의 데이터 변환 전용 언어입니다.
#
#  ┌──────────────────────────────────────────────────────────────┐
#  │  데이터 흐름                                                 │
#  │                                                              │
#  │  Agent → .equipment_type = "SP", .log_type = "INSPECTION"   │
#  │       → Aggregator 수신                                      │
#  │       → parse_logs에서 equipment_type + log_type 기준 분기   │
#  │       → 파싱 로직 적용                                       │
#  │       → format_for_api → Node.js API → Oracle DB            │
#  └──────────────────────────────────────────────────────────────┘
#
#  분기 기준:
#    1단계: equipment_type (설비유형) - SP, SPI, AOI 등 13종
#    2단계: log_type (로그유형) - INSPECTION, ALARM, PROCESS
#
#  로그 유형 (3종):
#    INSPECTION - 검사/작업 결과 로그 (메인)
#    ALARM      - 알람/경고 로그
#    PROCESS    - 공정 진행 로그
#
#  설비 유형 (13종):
#    SP, SPI, MAOI, AOI, REFLOW, ICT, FCT,
#    BURNIN, HIPOT, EOL, METALMASK, MOUNTER, VISCOSITY
#
#  ★ 새 설비 추가 시: 아래 if 분기에 해당 설비의 파싱 로직을 추가하세요
#
# =============================================================================

[transforms.parse_logs]
type = "remap"
inputs = ["route_events._unmatched"]
drop_on_abort = false
source = '''
# 원본 메시지를 보존 (raw 파일 저장용)
.raw_message = .message

# Windows 줄바꿈(\r) 제거 — CSV 파일의 \r\n을 \n으로 통일
.message = replace!(to_string!(.message), r'\r', "")

# 원본 파일명 추출
.filename = ""
file_str = to_string!(.file)
.filename = replace!(file_str, r'.*[\\/]', "")

# 데이터 저장 방식 (TABLE: 테이블 INSERT, PROCEDURE: 프로시져 CALL)
.target_type = "TABLE"

# 대상 Oracle 테이블명 설정 (로그 유형 기준)
# LOG_INSPECTION, LOG_ALARM, LOG_PROCESS
.target_table = "LOG_" + to_string!(.log_type)

# =================================================
# 1단계: 설비유형별 분기 (equipment_type)
# 2단계: 로그유형별 분기 (log_type)
#
# 구조:
#   if equipment_type == "AOI" {
#     if log_type == "INSPECTION" { ... 검사 결과 파싱 ... }
#     else if log_type == "ALARM" { ... 알람 파싱 ... }
#     else if log_type == "PROCESS" { ... 공정 파싱 ... }
#   }
# =================================================

if .equipment_type == "SP" {
  # ── SP (Solder Paste Printer) ──
  if .log_type == "INSPECTION" {
    .data = {}
  } else if .log_type == "ALARM" {
    .data = {}
  } else if .log_type == "PROCESS" {
    .data = {}
  } else {
    .data = {}
  }

} else if .equipment_type == "SPI" {
  .target_table = "LOG_SPI"
  # PROCEDURE 모드 사용 시 아래 두 줄의 주석을 해제하세요
  values = split!(to_string!(.message), "\n")
  data_line = split!(to_string!(get!(values, [1])), ",")
  .data.MASTER_BARCODE = strip_whitespace(to_string!(get!(data_line, [0])))
  .data.PCB_ID = strip_whitespace(to_string!(get!(data_line, [1])))
  .data.INSPECTION_DATE = strip_whitespace(to_string!(get!(data_line, [2])))
  .data.INSPECTION_START_TIME = strip_whitespace(to_string!(get!(data_line, [3])))
  .data.INSPECTION_END_TIME = strip_whitespace(to_string!(get!(data_line, [4])))
  .data.TOTAL_PANEL_COUNT = strip_whitespace(to_string!(get!(data_line, [5])))
  .data.JOB_NAME = strip_whitespace(to_string!(get!(data_line, [6])))
  .data.PCB_RESULT = strip_whitespace(to_string!(get!(data_line, [7])))
  .data.USER_ID = strip_whitespace(to_string!(get!(data_line, [8])))
  .data.LOT_INFO = strip_whitespace(to_string!(get!(data_line, [9])))
  .data.MACHINE_ID = strip_whitespace(to_string!(get!(data_line, [10])))
  .data.SIDE = strip_whitespace(to_string!(get!(data_line, [11])))
  .data.LANE = strip_whitespace(to_string!(get!(data_line, [12])))
} else if .equipment_type == "MAOI" {
  # ── MAOI (Manual AOI) ──
  if .log_type == "INSPECTION" {
    .data = {}
  } else if .log_type == "ALARM" {
    .data = {}
  } else if .log_type == "PROCESS" {
    .data = {}
  } else {
    .data = {}
  }

} else if .equipment_type == "AOI" {
  # ── AOI (Automated Optical Inspection) ──
  if .log_type == "INSPECTION" {
    .target_table = "IQ_MACHINE_INSPECT_DATA_AOI"
    # 파일 구조 (multiline으로 통째 수신):
    #   줄1: BoardInfo
    #   줄2: Inspector,Model,LotID,SerialNo,Result,...
    #   줄3: L04_SAOI,BN41-03347B,...,PASS,...,TOP,Front
    #   줄4: Inspection
    #   줄5: ModuleID,RefID,WindowNo,DefectType,...
    #   줄6~: 0,_COMP_61462_,5,WrongPart,...  (N행)

    lines = split!(to_string!(.message), "\n")

    # ── BoardInfo 파싱 (줄3) ──
    board_line = get!(lines, [2])
    board = split(to_string!(board_line), ",")
    .data.INSPECTOR    = strip_whitespace(to_string!(get!(board, [0])))
    .data.MODEL        = strip_whitespace(to_string!(get!(board, [1])))
    .data.LOT_ID       = strip_whitespace(to_string!(get!(board, [2])))
    .data.SERIAL_NO    = strip_whitespace(to_string!(get!(board, [3])))
    .data.RESULT       = strip_whitespace(to_string!(get!(board, [4])))
    .data.START_DATE   = strip_whitespace(to_string!(get!(board, [5])))
    .data.END_DATE     = strip_whitespace(to_string!(get!(board, [6])))
    .data.REVIEWED_DATE = strip_whitespace(to_string!(get!(board, [7])))
    .data.OPERATOR     = strip_whitespace(to_string!(get!(board, [8])))
    .data.BOARD_SIDE   = strip_whitespace(to_string!(get!(board, [9])))
    .data.LANE         = strip_whitespace(to_string!(get!(board, [10])))

    # ── Inspection 상세 파싱 (줄6~) ──
    .data.INSPECTIONS = []
    detail_lines = slice!(lines, 5)
    for_each(array!(detail_lines)) -> |_idx, row| {
      if row != "" {
        cols = split(to_string!(row), ",")
        if length(cols) >= 7 {
          inspection = {
            "MODULE_ID":   strip_whitespace(to_string!(get!(cols, [0]))),
            "REF_ID":      strip_whitespace(to_string!(get!(cols, [1]))),
            "WINDOW_NO":   strip_whitespace(to_string!(get!(cols, [2]))),
            "DEFECT_TYPE": strip_whitespace(to_string!(get!(cols, [3]))),
            "PART_NAME":   strip_whitespace(to_string!(get!(cols, [4]))),
            "REVIEW":      strip_whitespace(to_string!(get!(cols, [5]))),
            "FALSE_CALL":  strip_whitespace(to_string!(get!(cols, [6]))),
          }
          .data.INSPECTIONS = push(.data.INSPECTIONS, inspection)
        }
      }
    }
  } else if .log_type == "ALARM" {
    .data = {}
  } else if .log_type == "PROCESS" {
    .data = {}
  } else {
    .data = {}
  }

} else if .equipment_type == "REFLOW" {
  # ── REFLOW (Reflow Oven) ──
  if .log_type == "INSPECTION" {
    .data = {}
  } else if .log_type == "ALARM" {
    .data = {}
  } else if .log_type == "PROCESS" {
    .data = {}
  } else {
    .data = {}
  }

} else if .equipment_type == "ICT" {
  .target_table = "LOG_ICT"
  # Log Structure:
  # Line 0: header row (BARCODE,PCB NO,RESULT,...)
  # Line 1: first data row (actual values)
  # Lines 2-3: empty rows (skip)
  # Multi-row mode ACCUMULATE: parse ALL data rows into .data.ROWS array
  # Header has 24 columns — map ALL to UPPERCASE_SNAKE_CASE fields

  lines = split!(.message, "\n")

  # Parse header row (line 0) — not used for field names, but we know column count
  header = split(to_string!(get!(lines, [0])), ",")
  # Expected columns: 24

  # Parse first data row (line 1) into individual .data.FIELD values
  first_row = split(to_string!(get!(lines, [1])), ",")
  .data.BARCODE = strip_whitespace(to_string!(get!(first_row, [0])))
  .data.PCB_NO = strip_whitespace(to_string!(get!(first_row, [1])))
  .data.RESULT = strip_whitespace(to_string!(get!(first_row, [2])))
  .data.MODEL = strip_whitespace(to_string!(get!(first_row, [3])))
  .data.DAY = strip_whitespace(to_string!(get!(first_row, [4])))
  .data.TIME = strip_whitespace(to_string!(get!(first_row, [5])))
  .data.SW_VER = strip_whitespace(to_string!(get!(first_row, [6])))
  .data.MCU_HEX_CRC_1 = strip_whitespace(to_string!(get!(first_row, [7])))
  .data.MCU_HEX_CRC_2 = strip_whitespace(to_string!(get!(first_row, [8])))
  .data.MCU_HEX_CRC_3 = strip_whitespace(to_string!(get!(first_row, [9])))
  .data.MCU_HEX_CRC_4 = strip_whitespace(to_string!(get!(first_row, [10])))
  .data.MCU_HEX_CRC_5 = strip_whitespace(to_string!(get!(first_row, [11])))
  .data.MCU_HEX_CRC_6 = strip_whitespace(to_string!(get!(first_row, [12])))
  .data.MCU_HEX_CRC_7 = strip_whitespace(to_string!(get!(first_row, [13])))
  .data.ROM_CRC = strip_whitespace(to_string!(get!(first_row, [14])))
  .data.NAME = strip_whitespace(to_string!(get!(first_row, [15])))
  .data.MCU_CHKSUM = strip_whitespace(to_string!(get!(first_row, [16])))
  .data.ROM_CHKSUM = strip_whitespace(to_string!(get!(first_row, [17])))
  .data.MCU_READ_CHKSUM = strip_whitespace(to_string!(get!(first_row, [18])))
  .data.ROM_READ_CHKSUM = strip_whitespace(to_string!(get!(first_row, [19])))
  .data.MCU_RESULT = strip_whitespace(to_string!(get!(first_row, [20])))
  .data.ROM_RESULT = strip_whitespace(to_string!(get!(first_row, [21])))
  .data.DRV_IC_RESULT = strip_whitespace(to_string!(get!(first_row, [22])))

  # Parse ALL data rows (lines 1+) into .data.ROWS array
  .data.ROWS = []
  data_lines = slice!(lines, 1)
  for_each(array!(data_lines)) -> |_idx, row| {
    if row != "" {
      cols = split(to_string!(row), ",")
      # Only process rows with at least 24 columns (header count)
      if length(cols) >= 24 {
        item = {
          "BARCODE": strip_whitespace(to_string!(get!(cols, [0]))),
          "PCB_NO": strip_whitespace(to_string!(get!(cols, [1]))),
          "RESULT": strip_whitespace(to_string!(get!(cols, [2]))),
          "MODEL": strip_whitespace(to_string!(get!(cols, [3]))),
          "DAY": strip_whitespace(to_string!(get!(cols, [4]))),
          "TIME": strip_whitespace(to_string!(get!(cols, [5]))),
          "SW_VER": strip_whitespace(to_string!(get!(cols, [6]))),
          "MCU_HEX_CRC_1": strip_whitespace(to_string!(get!(cols, [7]))),
          "MCU_HEX_CRC_2": strip_whitespace(to_string!(get!(cols, [8]))),
          "MCU_HEX_CRC_3": strip_whitespace(to_string!(get!(cols, [9]))),
          "MCU_HEX_CRC_4": strip_whitespace(to_string!(get!(cols, [10]))),
          "MCU_HEX_CRC_5": strip_whitespace(to_string!(get!(cols, [11]))),
          "MCU_HEX_CRC_6": strip_whitespace(to_string!(get!(cols, [12]))),
          "MCU_HEX_CRC_7": strip_whitespace(to_string!(get!(cols, [13]))),
          "ROM_CRC": strip_whitespace(to_string!(get!(cols, [14]))),
          "NAME": strip_whitespace(to_string!(get!(cols, [15]))),
          "MCU_CHKSUM": strip_whitespace(to_string!(get!(cols, [16]))),
          "ROM_CHKSUM": strip_whitespace(to_string!(get!(cols, [17]))),
          "MCU_READ_CHKSUM": strip_whitespace(to_string!(get!(cols, [18]))),
          "ROM_READ_CHKSUM": strip_whitespace(to_string!(get!(cols, [19]))),
          "MCU_RESULT": strip_whitespace(to_string!(get!(cols, [20]))),
          "ROM_RESULT": strip_whitespace(to_string!(get!(cols, [21]))),
          "DRV_IC_RESULT": strip_whitespace(to_string!(get!(cols, [22]))),
        }
        .data.ROWS = push(.data.ROWS, item)
      }
    }
  }
} else if .equipment_type == "FCT" {
  lines = split!(to_string!(.message), "\n")
  .target_table = "LOG_FCT"
  .data.ROWS = []

  data_lines = slice!(lines, 1)
  for_each(array!(data_lines)) -> |_idx, row| {
    if strip_whitespace(to_string!(row)) != "" {
      cols = split(to_string!(row), ",")
      if length(cols) >= 31 {
        item = {
          "BARCODE": strip_whitespace(to_string!(get!(cols, [0]))),
          "DEVICE": strip_whitespace(to_string!(get!(cols, [1]))),
          "RESULT": strip_whitespace(to_string!(get!(cols, [2]))),
          "MODEL": strip_whitespace(to_string!(get!(cols, [3]))),
          "DATE": strip_whitespace(to_string!(get!(cols, [4]))),
          "TIME": strip_whitespace(to_string!(get!(cols, [5]))),
          "TYPE": strip_whitespace(to_string!(get!(cols, [6]))),
          "VOLT_INPUT_V": strip_whitespace(to_string!(get!(cols, [7]))),
          "VOLT_VALUE_V": strip_whitespace(to_string!(get!(cols, [8]))),
          "CURR_RESULT": strip_whitespace(to_string!(get!(cols, [9]))),
          "CURR_MIN_MA": strip_whitespace(to_string!(get!(cols, [10]))),
          "CURR_MAX_MA": strip_whitespace(to_string!(get!(cols, [11]))),
          "CURR_VALUE_MA": strip_whitespace(to_string!(get!(cols, [12]))),
          "LED_RESULT": strip_whitespace(to_string!(get!(cols, [13]))),
          "LED_NAME": strip_whitespace(to_string!(get!(cols, [14]))),
          "SCORE_MIN": strip_whitespace(to_string!(get!(cols, [15]))),
          "SCORE_MAX": strip_whitespace(to_string!(get!(cols, [16]))),
          "SCORE_VALUE": strip_whitespace(to_string!(get!(cols, [17]))),
          "SCORE_RESULT": strip_whitespace(to_string!(get!(cols, [18]))),
          "HUE_MIN": strip_whitespace(to_string!(get!(cols, [19]))),
          "HUE_MAX": strip_whitespace(to_string!(get!(cols, [20]))),
          "HUE_VALUE": strip_whitespace(to_string!(get!(cols, [21]))),
          "HUE_RESULT": strip_whitespace(to_string!(get!(cols, [22]))),
          "SAT_MIN": strip_whitespace(to_string!(get!(cols, [23]))),
          "SAT_MAX": strip_whitespace(to_string!(get!(cols, [24]))),
          "SAT_VALUE": strip_whitespace(to_string!(get!(cols, [25]))),
          "SAT_RESULT": strip_whitespace(to_string!(get!(cols, [26]))),
          "LUM_MIN": strip_whitespace(to_string!(get!(cols, [27]))),
          "LUM_MAX": strip_whitespace(to_string!(get!(cols, [28]))),
          "LUM_VALUE": strip_whitespace(to_string!(get!(cols, [29]))),
          "LUM_RESULT": strip_whitespace(to_string!(get!(cols, [30])))
        }
        .data.ROWS = push(.data.ROWS, item)
