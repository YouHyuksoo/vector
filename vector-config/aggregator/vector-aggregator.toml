        "DATETIME": strip_whitespace(to_string!(get!(cols, [0]))),
        "BARCODE": strip_whitespace(to_string!(get!(cols, [1]))),
        "FLOW_METER_G": strip_whitespace(to_string!(get!(cols, [2]))),
        "FLOW_MIN_G": strip_whitespace(to_string!(get!(cols, [3]))),
        "FLOW_MAX_G": strip_whitespace(to_string!(get!(cols, [4]))),
        "RESULT": strip_whitespace(to_string!(get!(cols, [5])))
      }
      .data.ROWS = push(.data.ROWS, item)
    }
  }
} else if .equipment_type == "COATING2" {  # Log Structure: Multi-row CSV with single header line (line 0)
  .target_table = "LOG_COATING2"
  # Line 0: header row (DateTime,Barcode,FlowMeter(g),Flow Min(g),Flow Max(g),Result)
  # Lines 1+: data rows
  # CSV 모든 데이터 행을 .data.ROWS 배열로 파싱 — Node.js가 행별로 INSERT
  lines = split!(.message, "\n")
  .data.ROWS = []
  data_lines = slice!(lines, 1)
  for_each(array!(data_lines)) -> |_idx, row| {
    if row != "" {
      cols = split(to_string!(row), ",")
      item = {
        "DATE_TIME": strip_whitespace(to_string!(get!(cols, [0]))),
        "BARCODE": strip_whitespace(to_string!(get!(cols, [1]))),
        "FLOW_METER_G": strip_whitespace(to_string!(get!(cols, [2]))),
        "FLOW_MIN_G": strip_whitespace(to_string!(get!(cols, [3]))),
        "FLOW_MAX_G": strip_whitespace(to_string!(get!(cols, [4]))),
        "RESULT": strip_whitespace(to_string!(get!(cols, [5]))),
      }
      .data.ROWS = push(.data.ROWS, item)
    }
  }
} else if .equipment_type == "COATINGVISION" {
  .target_table = "LOG_COATINGVISION"
  # Log Structure:
  # Line 0: header row (SaveDate,ProgramName,MainBarcode,SubBarcode,Name,Result,FinalResult)
  # Lines 1+: data rows (multiple rows, all same format)
  # No section labels — pure CSV with header.
  # CSV 모든 데이터 행을 .data.ROWS 배열로 파싱 — Node.js가 행별로 INSERT
  lines = split!(.message, "\n")
  .data.ROWS = []
  data_lines = slice!(lines, 1)
  for_each(array!(data_lines)) -> |_idx, row| {
    if row != "" {
      cols = split(to_string!(row), ",")
      item = {
        "SAVE_DATE": strip_whitespace(to_string!(get!(cols, [0]))),
        "PROGRAM_NAME": strip_whitespace(to_string!(get!(cols, [1]))),
        "MAIN_BARCODE": strip_whitespace(to_string!(get!(cols, [2]))),
        "SUB_BARCODE": strip_whitespace(to_string!(get!(cols, [3]))),
        "AREA_NAME": strip_whitespace(to_string!(get!(cols, [4]))),
        "RESULT": strip_whitespace(to_string!(get!(cols, [5]))),
        "FINAL_RESULT": strip_whitespace(to_string!(get!(cols, [6])))
      }
      .data.ROWS = push(.data.ROWS, item)
    }
  }
} else if .equipment_type == "COATINGREVIEW" {
  .target_table = "LOG_COATINGREVIEW"
  # Log Structure:
  # Line 0: header row (SaveDate,ProgramName,MainBarcode,SubBarcode,Name,Result,FinalResult)
  # Lines 1+: data rows (multiple rows per board, grouped by MainBarcode/SubBarcode/FinalResult)
  # Multi-row mode: ACCUMULATE — all rows belong to the same logical record
  # Fields to parse:
  # - SaveDate → SAVE_DATE
  # - ProgramName → PROGRAM_NAME
  # - MainBarcode → MAIN_BARCODE
  # - SubBarcode → SUB_BARCODE
  # - Name → AREA_NAME
  # - Result → AREA_RESULT
  # - FinalResult → FINAL_RESULT

  lines = split!(.message, "\n")

  # Parse header (line 0) to verify column order — not used for field names
  header = split(to_string!(get!(lines, [0])), ",")

  # CSV 모든 데이터 행을 .data.ROWS 배열로 파싱 — Node.js가 행별로 INSERT
  .data.ROWS = []
  data_lines = slice!(lines, 1)
  for_each(array!(data_lines)) -> |_idx, row| {
    if row != "" {
      cols = split(to_string!(row), ",")
      item = {
        "SAVE_DATE": strip_whitespace(to_string!(get!(cols, [0]))),
        "PROGRAM_NAME": strip_whitespace(to_string!(get!(cols, [1]))),
        "MAIN_BARCODE": strip_whitespace(to_string!(get!(cols, [2]))),
        "SUB_BARCODE": strip_whitespace(to_string!(get!(cols, [3]))),
        "AREA_NAME": strip_whitespace(to_string!(get!(cols, [4]))),
        "AREA_RESULT": strip_whitespace(to_string!(get!(cols, [5]))),
        "FINAL_RESULT": strip_whitespace(to_string!(get!(cols, [6]))),
      }
      .data.ROWS = push(.data.ROWS, item)
    }
  }
} else if .equipment_type == "MARKING" {
  .target_table = "LOG_MARKING"
  # Log Structure: MARKING equipment log (MULTI_ROW BATCH mode)
  # Line 0: CSV header row (WORK_ORDER_NO,MAIN_BARCODE,MARKED_BARCODE,MARKING_DT,EQUIPMENT_CD)
  # Lines 1+: Data rows (multiple rows per batch)
  # All data rows must be parsed into .data.ROWS array — Node.js will INSERT each row individually

  lines = split!(.message, "\n")
  .data.ROWS = []

  # Skip header (line 0), parse ALL data rows (lines 1+)
  data_lines = slice!(lines, 1)
  for_each(array!(data_lines)) -> |_idx, row| {
    if row != "" {
      cols = split(to_string!(row), ",")
      item = {
        "WORK_ORDER_NO": strip_whitespace(to_string!(get!(cols, [0]))),
        "MAIN_BARCODE": strip_whitespace(to_string!(get!(cols, [1]))),
        "MARKED_BARCODE": strip_whitespace(to_string!(get!(cols, [2]))),
        "MARKING_DT": strip_whitespace(to_string!(get!(cols, [3]))),
        "EQUIPMENT_CD": strip_whitespace(to_string!(get!(cols, [4]))),
      }
      .data.ROWS = push(.data.ROWS, item)
    }
  }
} else {
  log("Unknown equipment_type: " + to_string!(.equipment_type), level: "warn")
  .data = {}
}

# 타임스탬프 설정
.timestamp = now()
'''


# -----------------------------------------------------------------------------
# format_for_api: Node.js API 서버에 전송할 JSON 구조로 변환
# - 불필요한 필드를 제거하고, API가 기대하는 형식으로 정리합니다
# - equipment_id, log_type, target_table, timestamp, data 필드만 전달
# -----------------------------------------------------------------------------
[transforms.format_for_api]
type = "remap"
inputs = ["parse_logs"]
source = '''
ts = if exists(.timestamp) { to_string!(.timestamp) } else { to_string!(now()) }
. = {
  "equipment_id": .equipment_id,       # 설비 코드 (Agent가 태깅)
  "log_type": .log_type,               # 로그 유형 (INSPECTION/ALARM/PROCESS)
  "target_type": .target_type,         # 저장 방식 (TABLE/PROCEDURE)
  "target_table": .target_table,       # 저장 대상 (테이블명 또는 프로시져 레지스트리 키)
  "timestamp": ts,                     # 타임스탬프 (문자열로 변환)
  "data": .data                        # 파싱된 데이터 객체
}
'''


# =============================================================================
#  Sinks (출력): 파싱된 데이터를 어디로 보낼 것인가?
# =============================================================================


# -----------------------------------------------------------------------------
# Sink 1: Raw 로그 파일 저장 (원본 보관)
# -----------------------------------------------------------------------------
#
#  파싱 전 원본 데이터를 파일 그대로 저장합니다. (백업/감사 용도)
#  inputs = from_agents → 파싱(parse_logs) 전 원본 데이터를 받습니다.
#
#  path 설명:
#    C:\data\raw-logs\{설비유형}\{설비코드}\{년}\{월}\{일}\{원본파일명}
#    예) C:\data\raw-logs\AOI\AOI-LINE1-001\2026\02\20\result_001.csv
#
#    {{ equipment_type }} → Agent가 태깅한 설비 유형
#    {{ equipment_id }}   → Agent가 태깅한 설비 코드
#    %Y, %m, %d           → 년, 월, 일로 자동 치환
#
#  encoding:
#    codec = "text" → .message 필드만 텍스트로 저장 (Agent가 보낸 원본)
#
#  buffer:
#    type = "disk"     → 디스크 버퍼 사용 (메모리보다 안전)
#    max_size          → 536870912 = 512MB
#    when_full = "block" → 버퍼 가득 차면 대기 (데이터 유실 방지)
#
# -----------------------------------------------------------------------------

# 원본 저장용 파일명 추출 (데이터 내용은 변경하지 않고 .filename만 추가)
[transforms.tag_filename]
type = "remap"
inputs = ["route_events._unmatched"]
source = '''
.filename = replace!(to_string!(.file), r'.*[\\/]', "")
'''

# -----------------------------------------------------------------------------
# 파일 수신 알림: Agent로부터 데이터 수신 시 Node.js에 알림 전송
# - 파이프라인 첫 번째 단계(FILE_RECEIVE) 로그 기록용
# -----------------------------------------------------------------------------
[transforms.file_receive_notify]
type = "remap"
inputs = ["route_events._unmatched"]
source = '''
. = {
  "equipment_id": .equipment_id,
  "equipment_type": .equipment_type,
  "log_type": .log_type,
  "filename": replace!(to_string!(.file), r'.*[\\/]', "")
}
'''

[sinks.to_file_notify]
type = "http"
inputs = ["file_receive_notify"]
uri = "http://127.0.0.1:3110/api/logs/file-received"
method = "post"

[sinks.to_file_notify.encoding]
codec = "json"

[sinks.to_file_notify.batch]
max_events = 100
timeout_secs = 2

[sinks.to_file_notify.request]
retry_initial_backoff_secs = 1
retry_max_duration_secs = 10

[sinks.to_file_notify.request.headers]
Content-Type = "application/json"

[sinks.raw_file]
type = "file"
inputs = ["tag_filename"]         # 파싱 전 원본 + 파일명 태그
path = 'C:\data\raw-logs\{{ equipment_type }}\{{ equipment_id }}\%Y-%m-%d\{{ filename }}'

[sinks.raw_file.encoding]
codec = "text"

[sinks.raw_file.buffer]
type = "disk"
max_size = 536870912              # 512MB
when_full = "block"


# -----------------------------------------------------------------------------
# Sink 2: Node.js API 서버로 HTTP 전송
# -----------------------------------------------------------------------------
#
#  파싱된 데이터를 Node.js API 서버(port 3100)로 POST 전송합니다.
#  Node.js 서버가 이 데이터를 받아서 Oracle DB에 저장합니다.
#
#  uri:
#    http://127.0.0.1:3110/api/logs → Node.js API의 로그 수신 엔드포인트
#    서버가 다른 호스트에 있으면 IP를 변경하세요
#
#  batch (배치 처리):
#    max_events   = 100 → 100개 이벤트마다 한번에 전송 (성능 최적화)
#    timeout_secs = 5   → 100개 안 모여도 5초마다 전송 (지연 방지)
#
#  buffer:
#    type = "disk"     → 디스크 버퍼 (API 서버 다운 시 데이터 보관)
#    max_size          → 536870912 = 512MB
#    when_full = "block" → 버퍼 가득 차면 대기
#
#  request (재시도 설정):
#    retry_initial_backoff_secs = 1  → 실패 시 1초 후 재시도
#    retry_max_duration_secs = 30    → 최대 30초까지 재시도 간격 증가
#
# -----------------------------------------------------------------------------

[sinks.to_api]
type = "http"
inputs = ["format_for_api"]       # format_for_api에서 정리된 데이터를 전송
uri = "http://127.0.0.1:3110/api/logs"    # ← Node.js API 서버 주소
method = "post"

[sinks.to_api.encoding]
codec = "json"

[sinks.to_api.batch]
max_events = 100                  # 100개씩 묶어서 전송
timeout_secs = 5                  # 5초마다 전송 (100개 안 모여도)

[sinks.to_api.buffer]
type = "disk"
max_size = 536870912              # 512MB
when_full = "block"

[sinks.to_api.request]
retry_initial_backoff_secs = 1    # 실패 시 1초 후 첫 재시도
retry_max_duration_secs = 30      # 재시도 간격 최대 30초

[sinks.to_api.request.headers]
Content-Type = "application/json"


# -----------------------------------------------------------------------------
# Sink 3: 메트릭 이벤트 드랍 (Vector internal_metrics)
# -----------------------------------------------------------------------------
#
#  Agent에서 유입되는 Vector 내부 메트릭(internal_metrics)을 버립니다.
#  route_events에서 is_metric 조건으로 분리된 이벤트를 소비합니다.
#  blackhole sink는 이벤트를 받기만 하고 아무 곳에도 저장하지 않습니다.
#
# -----------------------------------------------------------------------------

[sinks.drop_metrics]
type = "blackhole"
inputs = ["route_events.is_metric"]
print_interval_secs = 0
