# =============================================================================
#  Vector Aggregator (수신기) - 중앙 서버에서 실행
# =============================================================================
#
#  역할: 여러 설비(Agent)에서 보내는 로그를 한곳에서 수신하여,
#        파싱 → 파일 저장 → Node.js API 서버로 전달합니다.
#
#  데이터 흐름:
#    Agent 전송 → Aggregator 수신 → raw 파일 저장 (원본 그대로)
#                                 → VRL 파싱 → HTTP API로 Node.js 전달
#                                            → Node.js가 Oracle DB에 저장
#
#  사전 조건:
#    1. Node.js API 서버(port 3100)가 먼저 실행 중이어야 합니다
#    2. 방화벽에서 port 6000 (Agent 수신용)이 열려 있어야 합니다
#
#  실행 명령어:
#    vector --config vector-aggregator.toml
#
# =============================================================================


# -----------------------------------------------------------------------------
# data_dir: Vector가 내부적으로 사용하는 데이터 저장 경로
# - 디스크 버퍼, 체크포인트 등을 저장합니다
# - 이 폴더가 없으면 Vector가 자동 생성합니다
# -----------------------------------------------------------------------------
data_dir = 'C:\Project\vector\vector-data'


# -----------------------------------------------------------------------------
# [api]: Vector 자체 API 서버 설정
# - Vector의 상태 확인, 헬스체크에 사용합니다
# - 프론트엔드 대시보드에서 Vector 상태를 조회할 때 이 API를 호출합니다
# - 0.0.0.0  → 모든 네트워크 인터페이스에서 접근 가능
# - 8687     → 포트 번호 (Agent는 8686 사용)
# -----------------------------------------------------------------------------
[api]
enabled = true
address = "0.0.0.0:8687"


# =============================================================================
#  Source (소스): Agent들로부터 데이터 수신
# =============================================================================
#
#  type    = "vector"  → Vector 프로토콜로 수신 (Agent가 같은 프로토콜로 전송)
#  address = "0.0.0.0:6000"
#    - 0.0.0.0 → 모든 네트워크에서 접속 허용 (Agent가 외부에서 접속하므로 필수)
#    - 6000    → 수신 포트 (Agent의 sinks.to_aggregator.address와 일치해야 함)
#
#  주의: Agent 설정의 address 포트와 반드시 동일해야 합니다!
#        Agent: address = "서버IP:6000"  ↔  Aggregator: address = "0.0.0.0:6000"
#
# =============================================================================

[sources.from_agents]
type = "vector"
address = "0.0.0.0:6000"


# =============================================================================
#  Source 2: Fluent Bit Agent 수신 (Fluentd forward 프로토콜)
# =============================================================================
#
#  32비트 Windows 등 Vector를 사용할 수 없는 설비 PC에서
#  Fluent Bit Agent가 forward 프로토콜로 전송한 로그를 수신합니다.
#
#  Fluent Bit Agent 설정 예시:
#    [OUTPUT]
#      Name   forward
#      Match  *
#      Host   서버IP
#      Port   24224
#
#  주의: Agent 설정의 Host/Port와 반드시 동일해야 합니다!
#
# =============================================================================

[sources.from_fluent_agents]
type = "fluent"
address = "0.0.0.0:24224"


# =============================================================================
#  Fluent Bit → Vector 필드 정규화
# =============================================================================
#
#  Fluent Bit가 보내는 필드명을 Vector Agent와 동일하게 맞춥니다.
#    .log  → .message  (파일 내용)
#    .path → .file     (원본 파일 경로)
#
#  metadata (equipment_type, equipment_id 등)는
#  Fluent Bit의 modify filter에서 동일하게 태깅되므로 그대로 통과합니다.
#
# =============================================================================

[transforms.normalize_fluent]
type = "remap"
inputs = ["from_fluent_agents"]
source = '''
msg = del(.log)
if msg != null { .message = msg }
fp = del(.path)
if fp != null { .file = fp }
'''


# =============================================================================
#  이벤트 라우팅: 하트비트 메트릭 vs 로그 이벤트 분리
# =============================================================================
#
#  Agent는 로그 이벤트(파일 데이터)와 메트릭 이벤트(하트비트)를 모두 전송합니다.
#  route 변환으로 하트비트 메트릭을 분리하여 별도 파이프라인으로 처리합니다.
#
#  - heartbeat: .name == "heartbeat" → 하트비트 API로 전달
#  - _unmatched: 나머지 로그 이벤트 → 기존 파싱 파이프라인
#
#  inputs: Vector Agent(from_agents) + Fluent Bit Agent(normalize_fluent) 모두 수신
#
# =============================================================================

[transforms.route_events]
type = "route"
inputs = ["from_agents", "normalize_fluent"]

[transforms.route_events.route]
# Vector internal_metrics(메트릭 이벤트)를 분리하여 드랍
# - Agent가 internal_metrics 소스를 포함한 경우, namespace="vector" 메트릭이 유입됨
# - 이 메트릭은 로그가 아니므로 parse_logs로 보내면 Validation 에러 발생
# - heartbeat는 Agent Manager가 직접 HTTP POST로 전송 — Vector 경유 안 함
is_metric = 'exists(.namespace) && .namespace == "vector" && exists(.kind)'


# =============================================================================
#  Transforms (변환): 설비유형 + 로그유형별 파싱
# =============================================================================
#
#  Agent가 태깅한 .equipment_type, .log_type 필드를 기준으로 파싱 로직을 분기합니다.
#  VRL(Vector Remap Language)은 Vector의 데이터 변환 전용 언어입니다.
#
#  ┌──────────────────────────────────────────────────────────────┐
#  │  데이터 흐름                                                 │
#  │                                                              │
#  │  Agent → .equipment_type = "SP", .log_type = "INSPECTION"   │
#  │       → Aggregator 수신                                      │
#  │       → parse_logs에서 equipment_type + log_type 기준 분기   │
#  │       → 파싱 로직 적용                                       │
#  │       → format_for_api → Node.js API → Oracle DB            │
#  └──────────────────────────────────────────────────────────────┘
#
#  분기 기준:
#    1단계: equipment_type (설비유형) - SP, SPI, AOI 등 13종
#    2단계: log_type (로그유형) - INSPECTION, ALARM, PROCESS
#
#  로그 유형 (3종):
#    INSPECTION - 검사/작업 결과 로그 (메인)
#    ALARM      - 알람/경고 로그
#    PROCESS    - 공정 진행 로그
#
#  설비 유형 (13종):
#    SP, SPI, MAOI, AOI, REFLOW, ICT, FCT,
#    BURNIN, HIPOT, EOL, METALMASK, MOUNTER, VISCOSITY
#
#  ★ 새 설비 추가 시: 아래 if 분기에 해당 설비의 파싱 로직을 추가하세요
#
# =============================================================================

[transforms.parse_logs]
type = "remap"
inputs = ["route_events._unmatched"]
drop_on_abort = false
source = '''
# 원본 메시지를 보존 (raw 파일 저장용)
.raw_message = .message

# Windows 줄바꿈(\r) 제거 — CSV 파일의 \r\n을 \n으로 통일
.message = replace!(to_string!(.message), r'\r', "")

# 원본 파일명 추출
.filename = ""
file_str = to_string!(.file)
.filename = replace!(file_str, r'.*[\\/]', "")

# 데이터 저장 방식 (TABLE: 테이블 INSERT, PROCEDURE: 프로시져 CALL)
.target_type = "TABLE"

# 대상 Oracle 테이블명 설정 (로그 유형 기준)
# LOG_INSPECTION, LOG_ALARM, LOG_PROCESS
.target_table = "LOG_" + to_string!(.log_type)

# =================================================
# 1단계: 설비유형별 분기 (equipment_type)
# 2단계: 로그유형별 분기 (log_type)
#
# 구조:
#   if equipment_type == "AOI" {
#     if log_type == "INSPECTION" { ... 검사 결과 파싱 ... }
#     else if log_type == "ALARM" { ... 알람 파싱 ... }
#     else if log_type == "PROCESS" { ... 공정 파싱 ... }
#   }
# =================================================

if .equipment_type == "SPI" {
  .target_table = "LOG_SPI"
  # Log Structure (신규 KohYoung SPI 포맷, 2026-05~):
  # Line 0: Master header (MasterBarcode,PCBID,InspectionDate,InspectionStartTime,InspectionEndTime,TotalPanelCnt,JobName,PCBResult,UserID,LotInfo,MachineID,Side,Lane)
  # Line 1: Master data row
  # Line 2: "Panel" separator
  # Line 3: Panel header (ArrayBarcode,PanelResult)
  # Line 4+: Panel data rows
  # Line X: "ComponentID" header → IGNORE this and all following lines
  #
  # Master data (line 1) + Panel data (lines 4+) combined into .data.ROWS

  lines = split!(.message, "\n")

  # Parse Master section (line 1)
  master_cols = split(to_string!(get!(lines, [1])), ",")
  master_data = {
    "MASTER_BARCODE": strip_whitespace(to_string!(get!(master_cols, [0]))),
    "PCBID": strip_whitespace(to_string!(get!(master_cols, [1]))),
    "INSPECTION_DATE": strip_whitespace(to_string!(get!(master_cols, [2]))),
    "INSPECTION_START_TIME": strip_whitespace(to_string!(get!(master_cols, [3]))),
    "INSPECTION_END_TIME": strip_whitespace(to_string!(get!(master_cols, [4]))),
    "TOTAL_PANEL_CNT": strip_whitespace(to_string!(get!(master_cols, [5]))),
    "JOB_NAME": strip_whitespace(to_string!(get!(master_cols, [6]))),
    "PCB_RESULT": strip_whitespace(to_string!(get!(master_cols, [7]))),
    "USER_ID": strip_whitespace(to_string!(get!(master_cols, [8]))),
    "LOT_INFO": strip_whitespace(to_string!(get!(master_cols, [9]))),
    "MACHINE_ID": strip_whitespace(to_string!(get!(master_cols, [10]))),
    "SIDE": strip_whitespace(to_string!(get!(master_cols, [11]))),
    "LANE": strip_whitespace(to_string!(get!(master_cols, [12])))
  }

  .data.ROWS = []
  panel_start_line = 4
  panel_end_line = length(lines)

  for_each(array!(slice!(lines, panel_start_line))) -> |idx, line| {
    if starts_with(to_string!(line), "ComponentID") {
      panel_end_line = panel_start_line + idx
    }
  }

  panel_lines = slice!(lines, panel_start_line, panel_end_line)
  for_each(array!(panel_lines)) -> |_idx, row| {
    if row != "" {
      panel_cols = split(to_string!(row), ",")
      item = {
        "MASTER_BARCODE": master_data.MASTER_BARCODE,
        "PCBID": master_data.PCBID,
        "INSPECTION_DATE": master_data.INSPECTION_DATE,
        "INSPECTION_START_TIME": master_data.INSPECTION_START_TIME,
        "INSPECTION_END_TIME": master_data.INSPECTION_END_TIME,
        "TOTAL_PANEL_CNT": master_data.TOTAL_PANEL_CNT,
        "JOB_NAME": master_data.JOB_NAME,
        "PCB_RESULT": master_data.PCB_RESULT,
        "USER_ID": master_data.USER_ID,
        "LOT_INFO": master_data.LOT_INFO,
        "MACHINE_ID": master_data.MACHINE_ID,
        "SIDE": master_data.SIDE,
        "LANE": master_data.LANE,
        "ARRAY_BARCODE": strip_whitespace(to_string!(get!(panel_cols, [0]))),
        "PANEL_RESULT": strip_whitespace(to_string!(get!(panel_cols, [1])))
      }
      .data.ROWS = push(.data.ROWS, item)
    }
  }
} else if .equipment_type == "SPI_VD" {
  .target_table = "LOG_SPI_VD"
  # Log Structure:
  # Line 0: Master header (MasterBarcode,PCBID,InspectionDate,InspectionStartTime,InspectionEndTime,TotalPanelCnt,JobName,PCBResult,UserID,LotInfo,MachineID,Side,Lane)
  # Line 1: Master data row
  # Line 2: "Panel" separator
  # Line 3: Panel header (ArrayBarcode,PanelResult)
  # Line 4+: Panel data rows
  # Line X: "ComponentID" header → IGNORE this and all following lines
  #
  # Master data (line 1) + Panel data (lines 4+) combined into .data.ROWS

  lines = split!(.message, "\n")

  # Parse Master section (line 1)
  master_cols = split(to_string!(get!(lines, [1])), ",")
  master_data = {
    "MASTER_BARCODE": strip_whitespace(to_string!(get!(master_cols, [0]))),
    "PCBID": strip_whitespace(to_string!(get!(master_cols, [1]))),
    "INSPECTION_DATE": strip_whitespace(to_string!(get!(master_cols, [2]))),
    "INSPECTION_START_TIME": strip_whitespace(to_string!(get!(master_cols, [3]))),
    "INSPECTION_END_TIME": strip_whitespace(to_string!(get!(master_cols, [4]))),
    "TOTAL_PANEL_CNT": strip_whitespace(to_string!(get!(master_cols, [5]))),
    "JOB_NAME": strip_whitespace(to_string!(get!(master_cols, [6]))),
    "PCB_RESULT": strip_whitespace(to_string!(get!(master_cols, [7]))),
    "USER_ID": strip_whitespace(to_string!(get!(master_cols, [8]))),
    "LOT_INFO": strip_whitespace(to_string!(get!(master_cols, [9]))),
    "MACHINE_ID": strip_whitespace(to_string!(get!(master_cols, [10]))),
    "SIDE": strip_whitespace(to_string!(get!(master_cols, [11]))),
    "LANE": strip_whitespace(to_string!(get!(master_cols, [12])))
  }

  .data.ROWS = []
  panel_start_line = 4
  panel_end_line = length(lines)

  for_each(array!(slice!(lines, panel_start_line))) -> |idx, line| {
    if starts_with(to_string!(line), "ComponentID") {
      panel_end_line = panel_start_line + idx
    }
  }

  panel_lines = slice!(lines, panel_start_line, panel_end_line)
  for_each(array!(panel_lines)) -> |_idx, row| {
    if row != "" {
      panel_cols = split(to_string!(row), ",")
      item = {
        "MASTER_BARCODE": master_data.MASTER_BARCODE,
        "PCBID": master_data.PCBID,
        "INSPECTION_DATE": master_data.INSPECTION_DATE,
        "INSPECTION_START_TIME": master_data.INSPECTION_START_TIME,
        "INSPECTION_END_TIME": master_data.INSPECTION_END_TIME,
        "TOTAL_PANEL_CNT": master_data.TOTAL_PANEL_CNT,
        "JOB_NAME": master_data.JOB_NAME,
        "PCB_RESULT": master_data.PCB_RESULT,
        "USER_ID": master_data.USER_ID,
        "LOT_INFO": master_data.LOT_INFO,
        "MACHINE_ID": master_data.MACHINE_ID,
        "SIDE": master_data.SIDE,
        "LANE": master_data.LANE,
        "ARRAY_BARCODE": strip_whitespace(to_string!(get!(panel_cols, [0]))),
        "PANEL_RESULT": strip_whitespace(to_string!(get!(panel_cols, [1])))
      }
      .data.ROWS = push(.data.ROWS, item)
    }
  }

} else if .equipment_type == "AOI" {  # ── AOI (Automated Optical Inspection) ──
  .target_table = "LOG_AOI"
  if .log_type == "INSPECTION" {
    # 파일 구조 (multiline으로 통째 수신):
    #   줄1: BoardInfo
    #   줄2: Inspector,Model,LotID,SerialNo,Result,...
    #   줄3: L04_SAOI,BN41-03347B,...,PASS,...,TOP,Front
    #   줄4: Inspection
    #   줄5: ModuleID,RefID,WindowNo,DefectType,...
    #   줄6~: 0,_COMP_61462_,5,WrongPart,...  (N행)

    lines = split!(to_string!(.message), "\n")

    # ── BoardInfo 파싱 (줄3) ──
    board_line = get!(lines, [2])
    board = split(to_string!(board_line), ",")
    .data.INSPECTOR    = strip_whitespace(to_string!(get!(board, [0])))
    .data.MODEL        = strip_whitespace(to_string!(get!(board, [1])))
    .data.LOT_ID       = strip_whitespace(to_string!(get!(board, [2])))
    .data.SERIAL_NO    = strip_whitespace(to_string!(get!(board, [3])))
    .data.RESULT       = strip_whitespace(to_string!(get!(board, [4])))
    .data.START_DATE   = strip_whitespace(to_string!(get!(board, [5])))
    .data.END_DATE     = strip_whitespace(to_string!(get!(board, [6])))
    .data.OPERATOR     = strip_whitespace(to_string!(get!(board, [7])))
    .data.LANE         = strip_whitespace(to_string!(get!(board, [8])))

    # Inspection 섹션(줄4~) 무시 — BoardInfo 데이터(줄3)만 DB에 INSERT
  } else if .log_type == "ALARM" {
    .data = {}
  } else if .log_type == "PROCESS" {
    .data = {}
  } else {
    .data = {}
  }

} else if .equipment_type == "ICT" {
  .target_table = "LOG_ICT"
  # Log Structure: ICT multi-row CSV with header
  # Line 0: header row (BARCODE,OPEN,SHORT,Step,Board,Type,Device,Ideal,CH+,CH-,LC,STD,T+,T-,Meas,Error%,Result)
  # Lines 1+: data rows (17 columns, each row = one test step)

  lines = split!(.message, "\n")

  .data.ROWS = []
  data_lines = slice!(lines, 1)
  for_each(array!(data_lines)) -> |_idx, row| {
    if strip_whitespace(to_string!(row)) != "" {
      cols = split(to_string!(row), ",")
      item = {
        "BARCODE": strip_whitespace(to_string!(get!(cols, [0]))),
        "OPEN": strip_whitespace(to_string!(get!(cols, [1]))),
        "SHORT": strip_whitespace(to_string!(get!(cols, [2]))),
        "STEP": strip_whitespace(to_string!(get!(cols, [3]))),
        "BOARD": strip_whitespace(to_string!(get!(cols, [4]))),
        "LOG_TYPE": strip_whitespace(to_string!(get!(cols, [5]))),
        "DEVICE": strip_whitespace(to_string!(get!(cols, [6]))),
        "IDEAL": strip_whitespace(to_string!(get!(cols, [7]))),
        "CH_PLUS": strip_whitespace(to_string!(get!(cols, [8]))),
        "CH_MINUS": strip_whitespace(to_string!(get!(cols, [9]))),
        "LC": strip_whitespace(to_string!(get!(cols, [10]))),
        "STD": strip_whitespace(to_string!(get!(cols, [11]))),
        "T_PLUS": strip_whitespace(to_string!(get!(cols, [12]))),
        "T_MINUS": strip_whitespace(to_string!(get!(cols, [13]))),
        "MEAS": strip_whitespace(to_string!(get!(cols, [14]))),
        "ERROR_PCT": strip_whitespace(to_string!(get!(cols, [15]))),
        "RESULT": strip_whitespace(to_string!(get!(cols, [16]))),
      }
      .data.ROWS = push(.data.ROWS, item)
    }
  }
} else if .equipment_type == "ISCM_ICT" {
  # ── ISCM 모델 ICT 검사설비 (eTR5001SII) — 단일 테이블 ──
  # 로그 1파일 = 헤더블록([KEY]:VALUE) + // Header_Data + // Component_Data.
  #   Header_Data 는 폐기한다. 헤더블록에서 5종 그룹만 추출해 Component 각 행 앞에
  #   병합 → 단일 테이블 LOG_ISCM_ICT (Component 행수만큼 N행).
  #
  # 추출 컬럼:
  #   BARCODE, TOTAL_RESULT([RESULT]), RESULT_CURRENT([RESULT CURRENT]),
  #   HEX_FILE_1..16([HEX FILE n]), CRC_1..16([HEX CRC32 n] → CRC_n).
  # 중복: backend BARCODE_REPLACE_TABLES 가 BARCODE 단위 DELETE 후 bulk INSERT.
  # 날짜: 헤더에 신뢰 가능한 날짜 없음 → 트리거가 SYSDATE 로 ACTUAL_DATE 채움.

  lines = split!(.message, "\n")

  barcode = ""
  section = "HEADER"
  hdr = {}
  comp_lines = []

  for_each(array!(lines)) -> |_idx, raw| {
    line = to_string!(raw)
    t = strip_whitespace(line)

    if starts_with(t, "// Header_Data") {
      section = "HDATA"
    } else if starts_with(t, "// Component_Data") {
      section = "COMP"
    } else if starts_with(t, "//") || t == "" || starts_with(t, "*") {
      null  # 주석/빈줄/구분선 무시 (HDATA 섹션 본문은 어느 조건에도 매치되지 않아 자동 폐기됨)
    } else if section == "HEADER" {
      # BARCODE : [ 6711001861B ]
      bm = parse_regex(t, r'^BARCODE\s*:\s*\[\s*(?P<b>.*?)\s*\]\s*$') ?? {}
      if is_string(get(bm, ["b"]) ?? null) {
        barcode = to_string!(get!(bm, ["b"]))
      } else {
        # [KEY]:VALUE  /  [KEY   ] : VALUE
        km = parse_regex(t, r'^\[(?P<k>[^\]]+)\]\s*:(?P<v>.*)$') ?? {}
        if is_string(get(km, ["k"]) ?? null) {
          k = strip_whitespace(to_string!(get!(km, ["k"])))
          k = replace(k, "#", "")
          k = upcase(replace(k, r'\s+', "_"))
          v = strip_whitespace(to_string!(get!(km, ["v"])))
          # 후행 슬래시 정리 (예: "TEST_ISCM / ")
          v = strip_whitespace(replace(v, r'\s*/\s*$', ""))
          hdr = set!(hdr, [k], v)
        }
      }
    } else if section == "COMP" {
      comp_lines = push(comp_lines, line)
    }
