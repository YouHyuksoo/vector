  .data.MCU_HEX_CRC_4 = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [10])))
  .data.MCU_HEX_CRC_5 = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [11])))
  .data.MCU_HEX_CRC_6 = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [12])))
  .data.MCU_HEX_CRC_7 = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [13])))
  .data.ROM_CRC = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [14])))
  .data.NAME = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [15])))
  .data.MCU_CHKSUM = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [16])))
  .data.ROM_CHKSUM = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [17])))
  .data.MCU_READ_CHKSUM = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [18])))
  .data.ROM_READ_CHKSUM = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [19])))
  .data.MCU_RESULT = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [20])))
  .data.ROM_RESULT = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [21])))
  .data.DRV_IC_RESULT = strip_whitespace(to_string!(get!(split(to_string!(get!(lines, [1])), ","), [22])))

  .data.DETAILS = []
  detail_lines = slice!(lines, 1)
  for_each(array!(detail_lines)) -> |_idx, row| {
    if row != "" {
      cols = split(to_string!(row), ",")
      item = {
        "BARCODE": strip_whitespace(to_string!(get!(cols, [0]))),
        "PCB_NO": strip_whitespace(to_string!(get!(cols, [1]))),
        "RESULT": strip_whitespace(to_string!(get!(cols, [2]))),
        "MODEL": strip_whitespace(to_string!(get!(cols, [3]))),
        "DAY": strip_whitespace(to_string!(get!(cols, [4]))),
        "TIME": strip_whitespace(to_string!(get!(cols, [5]))),
        "SW_VER": strip_whitespace(to_string!(get!(cols, [6]))),
        "MCU_HEX_CRC_1": strip_whitespace(to_string!(get!(cols, [7]))),
        "MCU_HEX_CRC_2": strip_whitespace(to_string!(get!(cols, [8]))),
        "MCU_HEX_CRC_3": strip_whitespace(to_string!(get!(cols, [9]))),
        "MCU_HEX_CRC_4": strip_whitespace(to_string!(get!(cols, [10]))),
        "MCU_HEX_CRC_5": strip_whitespace(to_string!(get!(cols, [11]))),
        "MCU_HEX_CRC_6": strip_whitespace(to_string!(get!(cols, [12]))),
        "MCU_HEX_CRC_7": strip_whitespace(to_string!(get!(cols, [13]))),
        "ROM_CRC": strip_whitespace(to_string!(get!(cols, [14]))),
        "NAME": strip_whitespace(to_string!(get!(cols, [15]))),
        "MCU_CHKSUM": strip_whitespace(to_string!(get!(cols, [16]))),
        "ROM_CHKSUM": strip_whitespace(to_string!(get!(cols, [17]))),
        "MCU_READ_CHKSUM": strip_whitespace(to_string!(get!(cols, [18]))),
        "ROM_READ_CHKSUM": strip_whitespace(to_string!(get!(cols, [19]))),
        "MCU_RESULT": strip_whitespace(to_string!(get!(cols, [20]))),
        "ROM_RESULT": strip_whitespace(to_string!(get!(cols, [21]))),
        "DRV_IC_RESULT": strip_whitespace(to_string!(get!(cols, [22])))
      }
      .data.DETAILS = push(.data.DETAILS, item)
    }
  }
} else if .equipment_type == "LOWCURRENT" {  lines = split!(.message, "\n")
  .target_table = "LOG_LOWCURRENT"
  header = split(to_string!(get!(lines, [0])), ",")
  first_row = split(to_string!(get!(lines, [1])), ",")

  .data.BARCODE = strip_whitespace(to_string!(get!(first_row, [0])))
  .data.MODEL_NAME = strip_whitespace(to_string!(get!(first_row, [1])))
  .data.DATE = strip_whitespace(to_string!(get!(first_row, [2])))
  .data.START_TIME = strip_whitespace(to_string!(get!(first_row, [3])))
  .data.END_TIME = strip_whitespace(to_string!(get!(first_row, [4])))
  .data.CHANNEL = strip_whitespace(to_string!(get!(first_row, [5])))
  .data.MODE = strip_whitespace(to_string!(get!(first_row, [6])))
  .data.SET_CURRENT_UA = strip_whitespace(to_string!(get!(first_row, [7])))
  .data.SET_VOLTAGE_V = strip_whitespace(to_string!(get!(first_row, [8])))
  .data.MIN_RANGE = strip_whitespace(to_string!(get!(first_row, [9])))
  .data.MAX_RANGE = strip_whitespace(to_string!(get!(first_row, [10])))
  .data.MEASURED_VALUE = strip_whitespace(to_string!(get!(first_row, [11])))
  .data.MEASURE_RESULT = strip_whitespace(to_string!(get!(first_row, [12])))
  .data.DASH = strip_whitespace(to_string!(get!(first_row, [13])))
  .data.OVERALL_RESULT = strip_whitespace(to_string!(get!(first_row, [14])))

  .data.DETAILS = []
  detail_lines = slice!(lines, 1)
  for_each(array!(detail_lines)) -> |_idx, row| {
    if row != "" {
      cols = split(to_string!(row), ",")
      item = {
        "BARCODE": strip_whitespace(to_string!(get!(cols, [0]))),
        "MODEL_NAME": strip_whitespace(to_string!(get!(cols, [1]))),
        "DATE": strip_whitespace(to_string!(get!(cols, [2]))),
        "START_TIME": strip_whitespace(to_string!(get!(cols, [3]))),
        "END_TIME": strip_whitespace(to_string!(get!(cols, [4]))),
        "CHANNEL": strip_whitespace(to_string!(get!(cols, [5]))),
        "MODE": strip_whitespace(to_string!(get!(cols, [6]))),
        "SET_CURRENT_UA": strip_whitespace(to_string!(get!(cols, [7]))),
        "SET_VOLTAGE_V": strip_whitespace(to_string!(get!(cols, [8]))),
        "MIN_RANGE": strip_whitespace(to_string!(get!(cols, [9]))),
        "MAX_RANGE": strip_whitespace(to_string!(get!(cols, [10]))),
        "MEASURED_VALUE": strip_whitespace(to_string!(get!(cols, [11]))),
        "MEASURE_RESULT": strip_whitespace(to_string!(get!(cols, [12]))),
        "DASH": strip_whitespace(to_string!(get!(cols, [13]))),
        "OVERALL_RESULT": strip_whitespace(to_string!(get!(cols, [14]))),
      }
      .data.DETAILS = push(.data.DETAILS, item)
    }
  }
} else {
  log("Unknown equipment_type: " + to_string!(.equipment_type), level: "warn")
  .data = {}
}

# 타임스탬프 설정
.timestamp = now()
'''


# -----------------------------------------------------------------------------
# format_for_api: Node.js API 서버에 전송할 JSON 구조로 변환
# - 불필요한 필드를 제거하고, API가 기대하는 형식으로 정리합니다
# - equipment_id, log_type, target_table, timestamp, data 필드만 전달
# -----------------------------------------------------------------------------
[transforms.format_for_api]
type = "remap"
inputs = ["parse_logs"]
source = '''
. = {
  "equipment_id": .equipment_id,       # 설비 코드 (Agent가 태깅)
  "log_type": .log_type,               # 로그 유형 (INSPECTION/ALARM/PROCESS)
  "target_type": .target_type,         # 저장 방식 (TABLE/PROCEDURE)
  "target_table": .target_table,       # 저장 대상 (테이블명 또는 프로시져 레지스트리 키)
  "timestamp": to_string(.timestamp) ?? to_string!(now()), # 타임스탬프 (문자열로 변환)
  "data": .data                        # 파싱된 데이터 객체
}
'''


# =============================================================================
#  Sinks (출력): 파싱된 데이터를 어디로 보낼 것인가?
# =============================================================================


# -----------------------------------------------------------------------------
# Sink 1: Raw 로그 파일 저장 (원본 보관)
# -----------------------------------------------------------------------------
#
#  파싱 전 원본 데이터를 파일 그대로 저장합니다. (백업/감사 용도)
#  inputs = from_agents → 파싱(parse_logs) 전 원본 데이터를 받습니다.
#
#  path 설명:
#    C:\data\raw-logs\{설비유형}\{설비코드}\{년}\{월}\{일}\{원본파일명}
#    예) C:\data\raw-logs\AOI\AOI-LINE1-001\2026\02\20\result_001.csv
#
#    {{ equipment_type }} → Agent가 태깅한 설비 유형
#    {{ equipment_id }}   → Agent가 태깅한 설비 코드
#    %Y, %m, %d           → 년, 월, 일로 자동 치환
#
#  encoding:
#    codec = "text" → .message 필드만 텍스트로 저장 (Agent가 보낸 원본)
#
#  buffer:
#    type = "disk"     → 디스크 버퍼 사용 (메모리보다 안전)
#    max_size          → 536870912 = 512MB
#    when_full = "block" → 버퍼 가득 차면 대기 (데이터 유실 방지)
#
# -----------------------------------------------------------------------------

# 원본 저장용 파일명 추출 (데이터 내용은 변경하지 않고 .filename만 추가)
[transforms.tag_filename]
type = "remap"
inputs = ["route_events._unmatched"]
source = '''
.filename = replace!(.file, r'.*[\\/]', "")
'''

# -----------------------------------------------------------------------------
# 파일 수신 알림: Agent로부터 데이터 수신 시 Node.js에 알림 전송
# - 파이프라인 첫 번째 단계(FILE_RECEIVE) 로그 기록용
# -----------------------------------------------------------------------------
[transforms.file_receive_notify]
type = "remap"
inputs = ["route_events._unmatched"]
source = '''
. = {
  "equipment_id": .equipment_id,
  "equipment_type": .equipment_type,
  "log_type": .log_type,
  "filename": replace!(.file, r'.*[\\/]', "")
}
'''

[sinks.to_file_notify]
type = "http"
inputs = ["file_receive_notify"]
uri = "http://127.0.0.1:3100/api/logs/file-received"
method = "post"

[sinks.to_file_notify.encoding]
codec = "json"

[sinks.to_file_notify.batch]
max_events = 100
timeout_secs = 2

[sinks.to_file_notify.request]
retry_initial_backoff_secs = 1
retry_max_duration_secs = 10

[sinks.to_file_notify.request.headers]
Content-Type = "application/json"

[sinks.raw_file]
type = "file"
inputs = ["tag_filename"]         # 파싱 전 원본 + 파일명 태그
path = "C:\\data\\raw-logs\\{{ equipment_type }}\\{{ equipment_id }}\\%Y-%m-%d\\{{ filename }}"

[sinks.raw_file.encoding]
codec = "text"

[sinks.raw_file.buffer]
type = "disk"
max_size = 536870912              # 512MB
when_full = "block"


# -----------------------------------------------------------------------------
# Sink 2: Node.js API 서버로 HTTP 전송
# -----------------------------------------------------------------------------
#
#  파싱된 데이터를 Node.js API 서버(port 3100)로 POST 전송합니다.
#  Node.js 서버가 이 데이터를 받아서 Oracle DB에 저장합니다.
#
#  uri:
#    http://127.0.0.1:3100/api/logs → Node.js API의 로그 수신 엔드포인트
#    서버가 다른 호스트에 있으면 IP를 변경하세요
#
#  batch (배치 처리):
#    max_events   = 100 → 100개 이벤트마다 한번에 전송 (성능 최적화)
#    timeout_secs = 5   → 100개 안 모여도 5초마다 전송 (지연 방지)
#
#  buffer:
#    type = "disk"     → 디스크 버퍼 (API 서버 다운 시 데이터 보관)
#    max_size          → 536870912 = 512MB
#    when_full = "block" → 버퍼 가득 차면 대기
#
#  request (재시도 설정):
#    retry_initial_backoff_secs = 1  → 실패 시 1초 후 재시도
#    retry_max_duration_secs = 30    → 최대 30초까지 재시도 간격 증가
#
# -----------------------------------------------------------------------------

[sinks.to_api]
type = "http"
inputs = ["format_for_api"]       # format_for_api에서 정리된 데이터를 전송
uri = "http://127.0.0.1:3100/api/logs"    # ← Node.js API 서버 주소
method = "post"

[sinks.to_api.encoding]
codec = "json"

[sinks.to_api.batch]
max_events = 100                  # 100개씩 묶어서 전송
timeout_secs = 5                  # 5초마다 전송 (100개 안 모여도)

[sinks.to_api.buffer]
type = "disk"
max_size = 536870912              # 512MB
when_full = "block"

[sinks.to_api.request]
retry_initial_backoff_secs = 1    # 실패 시 1초 후 첫 재시도
retry_max_duration_secs = 30      # 재시도 간격 최대 30초

[sinks.to_api.request.headers]
Content-Type = "application/json"
