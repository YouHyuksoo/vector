# =============================================================================
#  Vector Agent (송신기) - ISCM_ICT 설비
# =============================================================================
#
#  역할: ISCM 모델 ICT 설비 PC의 작업처리결과 로그 파일(.txt, .csv, .log)을
#        중앙 서버(Aggregator)로 전송합니다.
#
#  ※ 로그 포맷은 기존 ICT와 동일(17컬럼 CSV)하며, Aggregator에서
#     ISCM_ICT 전용 VRL 블록으로 파싱되어 LOG_ICT 테이블에 저장됩니다.
#     기존 ICT와는 EQUIPMENT_ID 로 구분됩니다.
#
#  설치 방법:
#    1. 설비 PC에 Vector를 설치합니다 (vector.exe)
#    2. 이 파일을 설비 PC에 복사합니다
#    3. [설비 설정] 섹션에서 line_code, equipment_id를 변경합니다
#    4. [소스] 섹션에서 include 경로를 실제 로그 위치로 변경합니다
#    5. [출력] 섹션에서 address를 실제 서버 IP로 변경합니다
#
#  실행: vector --config ISCM_ICT.toml
#
# =============================================================================

data_dir = 'C:\vector-data-iscm_ict'

[api]
enabled = true
address = "127.0.0.1:8686"

# ── [소스] 모드 A — 파일 단위 전송 (현재 활성화) ──

[sources.work_logs]
type = "file"
include = [
  'C:\logs\iscm_ict\*.txt',
  'C:\logs\iscm_ict\*.csv',
]
read_from = "beginning"
encoding.charset = "euc-kr"
ignore_older_secs = 604800
fingerprint.strategy = "device_and_inode"

# ── 파일 전체를 하나의 이벤트로 묶기 ──
# start_pattern '^' — 로그 첫 줄이 빈 줄이라 '^.' 로는 빈 이벤트가 따로 떨어져 나온다
[sources.work_logs.multiline]
start_pattern = '^'
condition_pattern = '.*'
mode = "continue_through"
timeout_ms = 10000

# ── [소스] 재전송 폴더 — 여기에 복사하면 전송 후 자동 삭제 ──

[sources.resend_logs]
type = "file"
include = [
  'C:\logs\iscm_ict\resend\*',
]
read_from = "beginning"
encoding.charset = "euc-kr"
fingerprint.strategy = "device_and_inode"
fingerprint.bytes = 256
remove_after_secs = 30
ignore_checkpoints = true

[sources.resend_logs.multiline]
start_pattern = '^'
condition_pattern = '.*'
mode = "continue_through"
timeout_ms = 10000

# ── [설비 설정] ──
[transforms.add_metadata]
type = "remap"
inputs = ["work_logs", "resend_logs"]
source = '''
.equipment_type = "ISCM_ICT"
.log_type = "INSPECTION"
.line_code = "LINE-01"
.equipment_id = "ISCM_ICT-001"
'''

# ── [출력] Aggregator 서버로 전송 ──

[sinks.to_aggregator]
type = "vector"
inputs = ["add_metadata"]
address = "20.10.30.112:6000"

[sinks.to_aggregator.buffer]
type = "memory"
max_events = 500
when_full = "block"
