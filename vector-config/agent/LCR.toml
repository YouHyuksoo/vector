# =============================================================================
#  Vector Agent (송신기) - LCR 검사 설비
#  파일 형식: .docx (실제 INI + TSV 텍스트)
#  구조: [PCB] 헤더 섹션 + [LCR Data] 탭구분 데이터 행
#  전송 단위: 파일 1개 = 이벤트 1개 (multiline 전체 묶음)
# =============================================================================

data_dir = 'C:\vector-data-lcr'

[api]
enabled = true
address = "127.0.0.1:8686"

# ── [소스] LCR 검사 결과 파일 ──────────────────────────────────────────────
[sources.work_logs]
type = "file"
include = [
  'C:\logs\lcr\*.docx',
]
read_from = "beginning"
encoding.charset = "utf-16le"
fingerprint.strategy = "checksum"
fingerprint.bytes = 256
ignore_older_secs = 604800

# 파일 전체를 하나의 이벤트로 묶음
# [PCB] 로 시작하는 줄이 나오면 새 이벤트 시작
[sources.work_logs.multiline]
start_pattern = '^\[PCB\]'
condition_pattern = '^(?!\[PCB\]).*'
mode = "continue_through"
timeout_ms = 10000


# ── [소스] 재전송 폴더 — 여기에 복사하면 전송 후 자동 삭제 ──────────────
[sources.resend_logs]
type = "file"
include = [
  'C:\logs\lcr\resend\*',
]
read_from = "beginning"
encoding.charset = "utf-16le"
fingerprint.strategy = "device_and_inode"
fingerprint.bytes = 256
remove_after_secs = 30
ignore_checkpoints = true

[sources.resend_logs.multiline]
start_pattern = '^\[PCB\]'
condition_pattern = '^(?!\[PCB\]).*'
mode = "continue_through"
timeout_ms = 10000


# ── [변환] 설비 메타데이터 추가 ────────────────────────────────────────────
[transforms.add_metadata]
type = "remap"
inputs = ["work_logs", "resend_logs"]
source = '''
.equipment_type = "LCR"
.log_type = "LCR_CHECK"
.line_code = "01"
.equipment_id = "LCR-01"
'''

# ── [싱크] Aggregator 전송 ───────────────────────────────────────────────────
[sinks.to_aggregator]
type = "vector"
inputs = ["add_metadata"]
address = "20.10.30.112:6000"

[sinks.to_aggregator.buffer]
type = "memory"
max_events = 500
when_full = "block"
