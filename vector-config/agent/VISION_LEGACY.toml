# =============================================================================
#  Vector Agent (송신기) - VISION_LEGACY 설비
# =============================================================================
#
#  역할: VISION 구형 설비 PC의 검사결과 CSV 파일을
#        중앙 서버(Aggregator)로 전송합니다.
#
#  실행: vector --config VISION_LEGACY.toml
#
# =============================================================================

data_dir = 'C:\vector-data-vision_legacy'

[api]
enabled = true
address = "127.0.0.1:8686"

# ── [소스] 파일 단위 전송 ──

[sources.work_logs]
type = "file"
include = [
  'C:\logs\vision_legacy\*.txt',
  'C:\logs\vision_legacy\*.csv',
]
read_from = "beginning"
fingerprint.strategy = "checksum"
fingerprint.lines = 1
ignore_older_secs = 86400

# ── 파일 전체를 하나의 이벤트로 묶기 ──
[sources.work_logs.multiline]
start_pattern = "^"
condition_pattern = '^$$NEVER_MATCH'
mode = "halt_before"
timeout_ms = 1000

# ── [설비 설정] ──


# ── [하트비트] 주기적 상태 전송 (30초 간격) ──
[sources.heartbeat]
type = "internal_metrics"
interval_secs = 30
namespace = "agent"

[[sources.heartbeat.metrics]]
name = "heartbeat"
kind = "absolute"

[sources.heartbeat.metrics.value.gauge]
value = 1

[sources.heartbeat.metrics.tags]
equipment_type = "VISION_LEGACY"
equipment_id = "VISION_LEGACY-001"
line_code = "LINE-01"
log_type = "INSPECTION"

[transforms.add_metadata]
type = "remap"
inputs = ["work_logs"]
source = '''
.equipment_type = "VISION_LEGACY"
.log_type = "INSPECTION"
.line_code = "LINE-01"
.equipment_id = "VISION_LEGACY-001"
'''

# ── [출력] Aggregator 서버로 전송 ──

[sinks.to_aggregator]
type = "vector"
inputs = ["add_metadata", "heartbeat"]
address = "20.10.30.112:6000"

[sinks.to_aggregator.buffer]
type = "disk"
max_size = 268435488
when_full = "block"
