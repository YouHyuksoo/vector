# =============================================================================
#  Vector Agent (송신기) - SPI_VD 설비
# =============================================================================

data_dir = 'C:\vector-data-spi_vd'

[api]
enabled = true
address = "127.0.0.1:8686"

[sources.work_logs]
type = "file"
include = [
  'C:\logs\spi_vd\*.csv',
]
read_from = "beginning"
encoding.charset = "utf-8"
fingerprint.strategy = "device_and_inode"
ignore_older_secs = 604800

# ── 파일 전체를 하나의 이벤트로 묶기 ──
[sources.work_logs.multiline]
start_pattern = '^.'
condition_pattern = '.*'
mode = "continue_through"
timeout_ms = 10000

[transforms.add_metadata]
type = "remap"
inputs = ["work_logs"]
source = '''
.equipment_type = "SPI_VD"
.log_type = "INSPECTION"
.line_code = "LINE-01"
.equipment_id = "SPI_VD-001"
'''

[sinks.to_aggregator]
type = "vector"
inputs = ["add_metadata"]
address = "20.10.30.112:6000"

[sinks.to_aggregator.buffer]
type = "memory"
max_events = 500
when_full = "block"
