# =============================================================================
#  Vector Agent (송신기) - VISION_NATIVE 설비
# =============================================================================

data_dir = 'C:\vector-data-vision_native'

[api]
enabled = true
address = "127.0.0.1:8686"

[sources.work_logs]
type = "file"
include = [
  'C:\logs\vision_native\*.txt',
  'C:\logs\vision_native\*.csv',
]
read_from = "beginning"
ignore_older_secs = 86400
fingerprint.strategy = "checksum"
fingerprint.bytes = 256

# ── 파일 전체를 하나의 이벤트로 묶기 ──
[sources.work_logs.multiline]
start_pattern = "^"
condition_pattern = 'ZZZZZ_NEVER_MATCH_ZZZZZ'
mode = "halt_before"
timeout_ms = 1000

# ── [소스] 재전송 폴더 — 여기에 복사하면 전송 후 자동 삭제 ──

[sources.resend_logs]
type = "file"
include = [
  'C:\logs\vision_native\resend\*',
]
read_from = "beginning"
fingerprint.strategy = "checksum"
fingerprint.bytes = 256
remove_after_secs = 30
ignore_checkpoints = true

[sources.resend_logs.multiline]
start_pattern = "^"
condition_pattern = 'ZZZZZ_NEVER_MATCH_ZZZZZ'
mode = "halt_before"
timeout_ms = 1000

# ── [설비 설정] ──
[transforms.add_metadata]
type = "remap"
inputs = ["work_logs", "resend_logs"]
source = '''
.equipment_type = "VISION_NATIVE"
.log_type = "INSPECTION"
.line_code = "LINE-01"
.equipment_id = "VISION_NATIVE-001"
'''

[sinks.to_aggregator]
type = "vector"
inputs = ["add_metadata"]
address = "20.10.30.112:6000"

[sinks.to_aggregator.buffer]
type = "disk"
max_size = 268435488
when_full = "block"
