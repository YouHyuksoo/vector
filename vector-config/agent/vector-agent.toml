# =============================================================================
# Vector Agent - 설비 PC에서 실행
# 로그 파일 감시 → 메타데이터 태깅 → Aggregator 서버로 전송
#
# 초보자 가이드:
# 1. 설비 PC에 Vector 설치 후 이 설정 파일로 실행
# 2. EQUIPMENT_ID 환경 변수 설정 필수: set EQUIPMENT_ID=EQ-001
# 3. 로그 경로는 실제 설비 로그 위치로 변경
# 4. AGGREGATOR_SERVER_IP를 실제 서버 IP로 변경
#
# 실행: vector --config vector-agent.toml
# =============================================================================

data_dir = "C:\\Project\\vector\\vector-data-agent"

[api]
enabled = true
address = "127.0.0.1:8686"

# =============================================================================
# Sources: 로그 파일 감시
# 각 로그 타입별 디렉토리를 감시 (실제 경로로 변경 필요)
# =============================================================================

[sources.inspection_logs]
type = "file"
include = ["C:\\logs\\inspection\\*.log"]
read_from = "beginning"
fingerprint.strategy = "checksum"
fingerprint.lines = 1

[sources.alarm_logs]
type = "file"
include = ["C:\\logs\\alarm\\*.log"]
read_from = "beginning"
fingerprint.strategy = "checksum"
fingerprint.lines = 1

[sources.process_logs]
type = "file"
include = ["C:\\logs\\process\\*.log"]
read_from = "beginning"
fingerprint.strategy = "checksum"
fingerprint.lines = 1

# =============================================================================
# Transforms: 메타데이터 태깅
# 각 소스에 equipment_id, log_type, target_table 태그 부여
# =============================================================================

[transforms.tag_inspection]
type = "remap"
inputs = ["inspection_logs"]
source = '''
.equipment_id = get_env_var!("EQUIPMENT_ID")
.log_type = "INSPECTION"
.target_table = "LOG_INSPECTION"
'''

[transforms.tag_alarm]
type = "remap"
inputs = ["alarm_logs"]
source = '''
.equipment_id = get_env_var!("EQUIPMENT_ID")
.log_type = "ALARM"
.target_table = "LOG_ALARM"
'''

[transforms.tag_process]
type = "remap"
inputs = ["process_logs"]
source = '''
.equipment_id = get_env_var!("EQUIPMENT_ID")
.log_type = "PROCESS"
.target_table = "LOG_PROCESS"
'''

# =============================================================================
# Sink: Aggregator 서버로 전송 (디스크 버퍼로 유실 방지)
# address를 실제 Aggregator 서버 IP:PORT로 변경
# =============================================================================

[sinks.to_aggregator]
type = "vector"
inputs = ["tag_inspection", "tag_alarm", "tag_process"]
address = "127.0.0.1:6000"

[sinks.to_aggregator.buffer]
type = "disk"
max_size = 268435488  # 256MB (Vector 최소 요구값)
when_full = "block"
