# =============================================================================
#  Vector Agent (송신기) - MARKING 설비
# =============================================================================

data_dir = 'C:\vector-data-marking'

[api]
enabled = true
address = "127.0.0.1:8686"

[sources.work_logs]
type = "file"
include = [
  'C:\logs\marking\*.txt',
  'C:\logs\marking\*.csv',
  'C:\logs\marking\*.log',
]
read_from = "beginning"
fingerprint.strategy = "checksum"
fingerprint.bytes = 256
ignore_older_secs = 86400

[transforms.add_metadata]
type = "remap"
inputs = ["work_logs"]
source = '''
.equipment_type = "MARKING"
.log_type = "INSPECTION"
.line_code = "LINE-01"
.equipment_id = "MARKING-001"
'''

[sinks.to_aggregator]
type = "vector"
inputs = ["add_metadata"]
address = "127.0.0.1:6000"

[sinks.to_aggregator.buffer]
type = "disk"
max_size = 268435488
when_full = "block"
