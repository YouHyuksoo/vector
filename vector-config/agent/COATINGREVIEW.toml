# =============================================================================
#  Vector Agent (송신기) - COATINGREVIEW 설비
# =============================================================================

data_dir = 'C:\vector-data-coatingreview'

[api]
enabled = true
address = "127.0.0.1:8686"

[sources.work_logs]
type = "file"
include = [
  'C:\logs\coatingreview\*.txt',
  'C:\logs\coatingreview\*.csv',
  'C:\logs\coatingreview\*.log',
]
read_from = "beginning"
ignore_older_secs = 86400
fingerprint.strategy = "checksum"
fingerprint.bytes = 32768

# ── 파일 전체를 하나의 이벤트로 묶기 ──
[sources.work_logs.multiline]
start_pattern = '^.'
condition_pattern = '.*'
mode = "continue_through"
timeout_ms = 5000

# ── [소스] 재전송 폴더 — 여기에 복사하면 전송 후 자동 삭제 ──

[sources.resend_logs]
type = "file"
include = [
  'C:\logs\coatingreview\resend\*',
]
read_from = "beginning"
fingerprint.strategy = "checksum"
fingerprint.bytes = 256
remove_after_secs = 30
ignore_checkpoints = true

[sources.resend_logs.multiline]
start_pattern = '^.'
condition_pattern = '.*'
mode = "continue_through"
timeout_ms = 5000

# ── [설비 설정] ──

[transforms.add_metadata]
type = "remap"
inputs = ["work_logs", "resend_logs"]
source = '''
.equipment_type = "COATINGREVIEW"
.log_type = "INSPECTION"
.line_code = "LINE-01"
.equipment_id = "COATINGREVIEW-001"
'''

# ── [출력] Aggregator 서버로 전송 ──

[sinks.to_aggregator]
type = "vector"
inputs = ["add_metadata"]
address = "20.10.30.112:6000"

[sinks.to_aggregator.buffer]
type = "disk"
max_size = 268435488
when_full = "block"
