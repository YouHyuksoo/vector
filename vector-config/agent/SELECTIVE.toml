# =============================================================================
#  Vector Agent (송신기) - SELECTIVE 설비
# =============================================================================

data_dir = 'C:\vector-data-selective'

[api]
enabled = true
address = "127.0.0.1:8686"

[sources.work_logs]
type = "file"
include = [
  'C:\logs\selective\*.csv',
]
read_from = "beginning"
encoding.charset = "utf-8"
fingerprint.strategy = "device_and_inode"
ignore_older_secs = 604800

# ── 파일 전체를 하나의 이벤트로 묶기 ──
[sources.work_logs.multiline]
start_pattern = '^.'
condition_pattern = '.*'
mode = "continue_through"
timeout_ms = 10000

# ── [소스] 재전송 폴더 — 여기에 복사하면 전송 후 자동 삭제 ──

[sources.resend_logs]
type = "file"
include = [
  'C:\logs\selective\resend\*',
]
read_from = "beginning"
encoding.charset = "utf-8"
fingerprint.strategy = "device_and_inode"
fingerprint.bytes = 256
remove_after_secs = 30
ignore_checkpoints = true

[sources.resend_logs.multiline]
start_pattern = '^.'
condition_pattern = '.*'
mode = "continue_through"
timeout_ms = 10000

# ── [설비 설정] ──
[transforms.add_metadata]
type = "remap"
inputs = ["work_logs", "resend_logs"]
source = '''
.equipment_type = "SELECTIVE"
.log_type = "INSPECTION"
.line_code = "01"
.equipment_id = "SELECTIVE-01"
'''

[sinks.to_aggregator]
type = "vector"
inputs = ["add_metadata"]
address = "20.10.30.112:6000"

[sinks.to_aggregator.buffer]
type = "memory"
max_events = 500
when_full = "block"
