# =============================================================================
#  Vector Agent (송신기) - AOI 설비
# =============================================================================
#
#  역할: AOI 설비 PC의 작업처리결과 로그 파일(.txt, .csv, .log)을
#        중앙 서버(Aggregator)로 전송합니다.
#
#  설치 방법:
#    1. 설비 PC에 Vector를 설치합니다 (vector.exe)
#    2. 이 파일을 설비 PC에 복사합니다
#    3. [설비 설정] 섹션에서 line_code, equipment_id를 변경합니다
#    4. [소스] 섹션에서 include 경로를 실제 로그 위치로 변경합니다
#    5. [출력] 섹션에서 address를 실제 서버 IP로 변경합니다
#
#  실행: vector --config AOI.toml
#
# =============================================================================

data_dir = 'C:\vector-data-aoi'

[api]
enabled = true
address = "127.0.0.1:8686"

# ── [소스] 모드 A — 파일 단위 전송 (현재 활성화) ──

[sources.work_logs]
type = "file"
include = [
  'C:\logs\aoi\*.txt',
  'C:\logs\aoi\*.csv',
]
read_from = "beginning"
ignore_older_secs = 86400
fingerprint.strategy = "checksum"
fingerprint.bytes = 256

# ── 파일 전체를 하나의 이벤트로 묶기 ──
# 첫 번째 줄이 새 이벤트의 시작이 됨.
# 이후 모든 줄을 계속 이어붙임. 1초간 새 줄이 없으면 전송 완료.
[sources.work_logs.multiline]
start_pattern = "^"
condition_pattern = 'ZZZZZ_NEVER_MATCH_ZZZZZ'
mode = "halt_before"
timeout_ms = 1000

# ── [하트비트] 주기적 상태 전송 (30초 간격) ──
# Aggregator를 통해 Node.js API로 전달되어 Redis에 TTL 저장됩니다.
# TTL 내 하트비트가 없으면 오프라인으로 판정됩니다.

# ── [소스] 재전송 폴더 — 여기에 복사하면 전송 후 자동 삭제 ──

[sources.resend_logs]
type = "file"
include = [
  'C:\logs\aoi\resend\*',
]
read_from = "beginning"
fingerprint.strategy = "checksum"
fingerprint.bytes = 256
remove_after_secs = 30
ignore_checkpoints = true

[sources.resend_logs.multiline]
start_pattern = "^"
condition_pattern = 'ZZZZZ_NEVER_MATCH_ZZZZZ'
mode = "halt_before"
timeout_ms = 1000

# ── [설비 설정] ──

[transforms.add_metadata]
type = "remap"
inputs = ["work_logs", "resend_logs"]
source = '''
.equipment_type = "AOI"
.log_type = "INSPECTION"
.line_code = "LINE-01"
.equipment_id = "AOI-001"
'''

# ── [출력] Aggregator 서버로 전송 ──

[sinks.to_aggregator]
type = "vector"
inputs = ["add_metadata"]
address = "20.10.30.112:6000"

[sinks.to_aggregator.buffer]
type = "disk"
max_size = 268435488
when_full = "block"
