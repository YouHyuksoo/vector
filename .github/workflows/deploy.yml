# @file .github/workflows/deploy.yml
# @description GitHub Actions — Windows self-hosted runner 배포 파이프라인
#
# 초보자 가이드:
# 1. main 브랜치에 push 시 자동 실행
# 2. runner 작업폴더에서 checkout + 빌드
# 3. D:\Project\vector 로 동기화 배포
# 4. PM2로 무중단 재시작 (ecosystem.config.cjs)
#
# 사전 준비:
# - Windows 서버에 GitHub self-hosted runner 설치
#   (Settings > Actions > Runners > New self-hosted runner)
# - Node.js, PM2, Redis 설치 완료
# - Oracle Instant Client 설치 완료
# - D:\Project\vector\.env 파일 수동 배치 (최초 1회)

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# 동시 배포 방지
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  DEPLOY_DIR: D:\Project\vector

jobs:
  deploy:
    runs-on: [self-hosted, Windows]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend (TypeScript)
        run: npm run build

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend (Next.js)
        run: npm run build:frontend

      - name: Stop PM2 before sync
        run: pm2 stop ecosystem.config.cjs --silent 2>/dev/null || true
        working-directory: D:\Project\vector

      - name: Sync to deploy directory
        shell: powershell
        run: |
          $src = "${{ github.workspace }}"
          $dst = "${{ env.DEPLOY_DIR }}"

          # 배포 디렉토리 생성
          if (!(Test-Path $dst)) { New-Item -ItemType Directory -Path $dst -Force }

          # robocopy로 동기화 (node_modules, dist, .next 포함 / .env, data, logs 보존)
          robocopy $src $dst /MIR /NFL /NDL /NJH /NJS /NC /NS `
            /XF ".env" `
            /XD ".git" "vector-config\aggregator\backups" "data" "logs" "vector-bin" "vector-data" "vector-data-agent"

          # robocopy 종료코드 0~7은 정상
          if ($LASTEXITCODE -le 7) { exit 0 } else { exit $LASTEXITCODE }

      - name: Create logs directory
        run: mkdir -p logs
        working-directory: D:\Project\vector

      - name: Restart services with PM2
        working-directory: D:\Project\vector
        run: |
          if pm2 describe vector-backend > /dev/null 2>&1; then
            echo "Reloading existing PM2 processes..."
            pm2 reload ecosystem.config.cjs --update-env
          else
            echo "Starting PM2 processes for the first time..."
            pm2 start ecosystem.config.cjs
          fi
          pm2 save

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 5
          curl -sf http://localhost:3110/api/monitor/pipeline-status > /dev/null && echo "Backend OK" || echo "Backend not ready yet"
          curl -sf http://localhost:3100 > /dev/null && echo "Frontend OK" || echo "Frontend not ready yet"

      - name: Show PM2 status
        if: always()
        run: pm2 status
