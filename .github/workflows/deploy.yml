# @file .github/workflows/deploy.yml
# @description GitHub Actions - Windows self-hosted runner 배포 파이프라인
#
# 초보자 가이드:
# 1. main 브랜치에 push 시 자동 실행
# 2. DEPLOY_DIR 환경변수 경로로 동기화 배포
# 3. PM2로 무중단 재시작
#
# 사전 준비:
# - Windows 서버에 GitHub self-hosted runner 설치
# - GitHub > Settings > Actions > Runners 에서 LogServer 라벨 추가
# - Node.js 24, PM2 설치 (Oracle은 Thin mode 사용)
# - 서버에 DEPLOY_DIR 시스템 환경변수 설정 (관리자 PowerShell):
#     [System.Environment]::SetEnvironmentVariable('DEPLOY_DIR', 'D:\Project\vector', 'Machine')
# - runner 서비스 재시작 (환경변수 반영)
# - {DEPLOY_DIR}\.env 파일 수동 배치 (최초 1회)

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Windows, LogServer]

    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

    steps:
      - name: Verify DEPLOY_DIR
        run: |
          if (-not $env:DEPLOY_DIR) {
            Write-Host "##[error]DEPLOY_DIR is not set! Run on the server:"
            Write-Host "  [System.Environment]::SetEnvironmentVariable('DEPLOY_DIR', 'C:\Project\vector', 'Machine')"
            exit 1
          }
          Write-Host "[LogServer] Deploy target: $env:DEPLOY_DIR"

      - name: Disable autocrlf
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend (TypeScript)
        run: npm run build

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend (Next.js)
        run: npm run build:frontend

      - name: Stop PM2 before sync
        run: |
          if (Test-Path "$env:DEPLOY_DIR\ecosystem.config.cjs") {
            try {
              Set-Location $env:DEPLOY_DIR
              pm2 stop ecosystem.config.cjs 2>$null
            } catch {}
          } else {
            Write-Host "First deploy, skipping PM2 stop"
          }

      - name: Sync to deploy directory
        run: |
          $src = "${{ github.workspace }}"
          $dst = $env:DEPLOY_DIR

          if (!(Test-Path $dst)) { New-Item -ItemType Directory -Path $dst -Force }

          # 전체 동기화: 로컬(git) = 서버. 서버 전용 파일/디렉토리만 보호.
          robocopy $src $dst /MIR /NFL /NDL /NJH /NJS /NC /NS `
            /XF ".env" "ai-config.json" "ai-system-prompt.txt" "parse-fields.json" "table-registry.json" `
            /XD ".git" "data" "logs" "vector-data" "vector-data-agent" "vector-config\aggregator"

          if ($LASTEXITCODE -le 7) { exit 0 } else { exit $LASTEXITCODE }

      - name: Extract vector-x64.zip to vector-bin/bin
        run: |
          $zip = "$env:DEPLOY_DIR\vector-bin\vector-x64.zip"
          $dst = "$env:DEPLOY_DIR\vector-bin"
          if (Test-Path $zip) {
            # vector.exe 실행 중이면 Copy-Item 충돌 → 잠시 정지 (이후 Aggregator restart 단계에서 재시작)
            $vectorProc = Get-Process -Name "vector" -ErrorAction SilentlyContinue
            if ($vectorProc) {
              Stop-Process -Name "vector" -Force
              Start-Sleep -Seconds 2
              Write-Host "vector.exe stopped for extract"
            }
            Expand-Archive -Path $zip -DestinationPath "$dst\temp" -Force
            # zip 안에 bin/vector.exe 가 있음 → vector-bin/bin/vector.exe 로 이동
            if (Test-Path "$dst\temp\bin") {
              if (!(Test-Path "$dst\bin")) { New-Item -ItemType Directory -Path "$dst\bin" -Force }
              Copy-Item "$dst\temp\bin\*" "$dst\bin\" -Force
              Write-Host "vector.exe extracted to $dst\bin"
            }
            Remove-Item "$dst\temp" -Recurse -Force
          } else {
            Write-Host "##[warning]vector-x64.zip not found - skipping"
          }

      - name: Fix TOML line endings (CRLF to LF)
        run: |
          Get-ChildItem "$env:DEPLOY_DIR\vector-config" -Recurse -Filter "*.toml" | ForEach-Object {
            $content = [System.IO.File]::ReadAllText($_.FullName)
            if ($content -match "`r") {
              $content = $content -replace "`r`n", "`n"
              [System.IO.File]::WriteAllText($_.FullName, $content, [System.Text.UTF8Encoding]::new($false))
              Write-Host "Fixed: $($_.Name)"
            }
          }

      - name: Create logs directory
        run: |
          $logsDir = "$env:DEPLOY_DIR\logs"
          if (!(Test-Path $logsDir)) { New-Item -ItemType Directory -Path $logsDir -Force }

      - name: Restart services with PM2
        run: |
          Set-Location $env:DEPLOY_DIR
          $ErrorActionPreference = "SilentlyContinue"
          pm2 describe vector-backend 2>$null | Out-Null
          $running = ($LASTEXITCODE -eq 0)
          $ErrorActionPreference = "Stop"
          if ($running) {
            Write-Host "Reloading existing PM2 processes..."
            pm2 reload ecosystem.config.cjs --update-env
          } else {
            Write-Host "Starting PM2 processes for the first time..."
            pm2 start ecosystem.config.cjs
          }
          pm2 save

      - name: Verify backend port + cleanup orphan
        # PM2 graceful shutdown stuck 시 구 backend가 port 3110 점유한 채 남아
        # 신 backend가 EADDRINUSE로 재시작 반복하는 사고 방지 (2026-05-14 발생).
        # PM2가 관리하는 PID와 실제 listen PID 다르면 orphan으로 보고 강제 정리.
        continue-on-error: true
        run: |
          Set-Location $env:DEPLOY_DIR
          $ErrorActionPreference = 'SilentlyContinue'
          Start-Sleep -Seconds 5
          try {
            $jlistOut = pm2 jlist 2>$null
            $pm2Json = if ($jlistOut) { $jlistOut | ConvertFrom-Json } else { @() }
            $backend = $pm2Json | Where-Object { $_.name -eq 'vector-backend' } | Select-Object -First 1
            $pm2Pid = if ($backend -and $backend.pid) { [int]$backend.pid } else { 0 }
            $listenLine = netstat -ano | Select-String '0\.0\.0\.0:3110\s+0\.0\.0\.0:0\s+LISTENING' | Select-Object -First 1
            $listenPid = if ($listenLine) { [int](($listenLine.ToString() -split '\s+')[-1]) } else { 0 }
            Write-Host "PM2 backend PID: $pm2Pid, Port 3110 listen PID: $listenPid"
            if ($listenPid -ne 0 -and $listenPid -ne $pm2Pid) {
              Write-Host "##[warning]Orphan PID $listenPid holding port 3110 - killing"
              taskkill /F /PID $listenPid 2>$null
              Start-Sleep -Seconds 2
              pm2 restart vector-backend 2>$null
              Start-Sleep -Seconds 5
              Write-Host "Backend restarted after orphan cleanup"
            } elseif ($pm2Pid -ne 0 -and $listenPid -eq 0) {
              Write-Host "##[warning]PM2 backend $pm2Pid not listening on 3110 yet - extra wait"
              Start-Sleep -Seconds 5
            } else {
              Write-Host "Backend port verified clean"
            }
          } catch {
            Write-Host "##[warning]Port verification failed: $_"
          }
          exit 0

      # NOTE: 별도의 "Restart Vector Aggregator" 단계 제거 (2026-05-14).
      # 이전엔 외부 Start-Process로 vector를 시작했으나, backend bootstrap의
      # startVector()와 동시에 spawn하며 port 6000/8687/24224 점유 충돌로
      # vector가 즉시 force-kill 되는 사고 발생.
      # PM2 reload가 backend를 재시작하면 backend가 vector를 알아서 spawn한다.
      # TOML만 변경된 경우엔 코드 변경이 없어 git push가 일어나지 않으므로,
      # 운영에서 POST /api/monitor/vector/reload 로 처리.

      - name: Health check
        run: |
          Start-Sleep -Seconds 5
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:3110/api/monitor/pipeline-status" -UseBasicParsing -TimeoutSec 5
            Write-Host "[LogServer] Backend OK (status: $($r.StatusCode))"
          } catch { Write-Host "[LogServer] Backend not ready yet" }
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:3100" -UseBasicParsing -TimeoutSec 5
            Write-Host "[LogServer] Frontend OK (status: $($r.StatusCode))"
          } catch { Write-Host "[LogServer] Frontend not ready yet" }

      - name: Show PM2 status
        if: always()
        run: pm2 status
